    if (this.heat > 0 && this.heatDecayTimer > HEAT_DECAY_DELAY) {
      this.heat -= HEAT_DECAY_RATE * dt / 1000;
      if (this.heat < 0) this.heat = 0;
    }

    // Batch 4: Slip timer
    if (this.slipCooldown > 0) {
      this.slipCooldown -= dt;
      if (this.slipCooldown < 0) this.slipCooldown = 0;
    }
    if (this.slipCounterWindow > 0) {
      this.slipCounterWindow -= dt;
      if (this.slipCounterWindow < 0) this.slipCounterWindow = 0;
    }
    if (this.state === STATES.SLIP) {
      this.slipTimer -= dt;
      if (this.slipTimer <= 0) {
        this.isSlipping = false;
        this.slipTimer = 0;
        this.slipCounterWindow = SLIP_COUNTER_WINDOW; // counter window opens after slip
        this.setState(STATES.IDLE);
      }
    }

    // Block raise timer
    if (this.state === STATES.BLOCK) {
      this.blockRaiseTimer += dt;
      const fearSlowdown = 1 + (this.fear / this.maxFear) * 0.8; // up to 80% slower at max fear
      if (this.blockRaiseTimer >= 80 * fearSlowdown && !this.blockRaised) {
        this.blockRaised = true;
      }
    }

    // Phase 2: Stamina regen/drain
    if (this.state === STATES.BLOCK) {
      this.stamina -= BLOCK_STAMINA_DRAIN * dt / 1000;
      if (this.stamina <= 0) { this.stamina = 0; this.unblock(); }
    } else if (this.state === STATES.IDLE || this.state === STATES.WALK) {
      this.stamina = Math.min(this.maxStamina, this.stamina + STAMINA_REGEN_RATE * dt / 1000);
    }

    // Reworked knockdown timer — variable AI get-up
    if (this.state === STATES.KNOCKDOWN && this.isDown) {
      this.knockdownTimer -= dt;
      // AI variable get-up — timing depends on condition/willpower
      if (!this.isPlayer) {
        const timeOnGround = KNOCKDOWN_DURATION - this.knockdownTimer;
        if (timeOnGround >= this.aiGetupDelay) {
          // AI tries to get up — simulate effort (not instant)
          this.attemptGetUp();
          // Stagger the attempts so it looks like struggling
          if (timeOnGround > this.aiGetupDelay + 100) this.attemptGetUp();
          if (timeOnGround > this.aiGetupDelay + 200) this.attemptGetUp();
          if (timeOnGround > this.aiGetupDelay + 300) {
            this.attemptGetUp();
            this.attemptGetUp();
          }
        }
      }
      if (this.knockdownTimer <= 0 && this.isDown) {
        // Failed to get up — KO
        this.isDown = false;
        this.health = 0;
        this.setState(STATES.KO);
        this.koTimer = KO_DURATION;
        this.alive = false;
        if (game) game.announcer.show('KO!', `${this.name} couldn't get up`, 2000);
      }
    }

    // Batch 1: Get-up animation (brief recovery)
    if (this.state === STATES.GETUP) {
      this.stateTimer += dt;
      if (this.stateTimer > 500) {
        this.setState(STATES.IDLE);
      }
    }

    // Batch 1: Clinch timer + auto-break
    if (this.state === STATES.CLINCH) {
      this.clinchTimer += dt;
      if (this.clinchTimer >= CLINCH_DURATION_MAX) {
        this.breakClinch();
      }
      // Keep fighters locked together
      if (this.clinchPartner) {
        const p = this.clinchPartner;
        const midX = (this.x + p.x) / 2;
        const midY = (this.y + p.y) / 2;
        this.x = lerp(this.x, midX - this.facing * 12, 0.1);
        this.y = lerp(this.y, midY, 0.1);
      }
    }
    if (this.clinchCooldown > 0) this.clinchCooldown -= dt;

    // Phase 3: Fear decay over time (calming down)
    if (this.fear > 0 && this.state !== STATES.HIT && this.state !== STATES.KNOCKDOWN) {
      this.fear -= this.fearDecayRate * dt / 1000;
      if (this.fear < 0) this.fear = 0;
      if (this.broken && this.fear < 20) this.broken = false;
    }

    // Post-knockdown wobble timer
    if (this.wobbleTimer > 0) {
      this.wobbleTimer -= dt;
      if (this.wobbleTimer < 0) this.wobbleTimer = 0;
    }

    // Batch 2: Stagger timer
    if (this.isStaggered) {
      this.staggerTimer -= dt;
      if (this.staggerTimer <= 0) {
        this.isStaggered = false;
        this.staggerTimer = 0;
      }
    }
    // Batch 2: Rapid hit window decay
    if (this.rapidHitTimer > 0) {
      this.rapidHitTimer -= dt;
      if (this.rapidHitTimer <= 0) {
        this.rapidHitTimer = 0;
        this.rapidHitCount = 0;
      }
    }

    // Batch 2: Blood trail — drip blood while moving when injured
    if (this.injuries > BLOOD_TRAIL_INJURY_THRESHOLD && this.state === STATES.WALK && game) {
      const interval = this.injuries > 60 ? BLOOD_TRAIL_HEAVY_INTERVAL : BLOOD_TRAIL_INTERVAL;
      this.bloodTrailTimer += dt;
      if (this.bloodTrailTimer >= interval) {
        this.bloodTrailTimer -= interval;
        const intensity = (this.injuries - BLOOD_TRAIL_INJURY_THRESHOLD) / 70; // 0-1
        const colors = ['#880000', '#660000', '#770000', '#550000'];
        // Small blood drops on the ground (long life = stays visible)
        const drip = new Particle(
          this.x + randRange(-6, 6), this.y + randRange(4, 10),
          0, 0,
          randItem(colors),
          randRange(2, 3 + intensity * 3),
          15000, // long life like blood pools
          0, 1
        );
        game.particles.add(drip);
        // Occasional larger splatter
        if (Math.random() < 0.3 * intensity) {
          const splat = new Particle(
            this.x + randRange(-8, 8), this.y + randRange(2, 8),
            randRange(-0.3, 0.3), randRange(0, 0.3),
            randItem(colors),
            randRange(3, 5 + intensity * 2),
            15000, 0, 1
          );
          game.particles.add(splat);
        }
      }
    }

    // Phase 1B: Knockback deceleration curve
    let friction;
    if (this.knockbackDuration > 0) {
      this.knockbackTimer += dt;
      if (this.knockbackTimer >= this.knockbackDuration) {
        this.knockbackTimer = 0;
        this.knockbackDuration = 0;
        friction = 0.85; // normal friction after knockback ends
      } else {
        // Interpolate friction: starts loose (body flies), ends heavy (brakes)
        const t = this.knockbackTimer / this.knockbackDuration;
        friction = lerp(KB_FRICTION_START, KB_FRICTION_END, t * t); // quadratic ramp to heavy braking
      }
    } else {
      friction = 0.85;
    }

    // Physics
    // Stagger + wobble reduce movement
    let moveMult = 1;
    if (this.isStaggered) moveMult *= STAGGER_SPEED_MULT;
    if (this.wobbleTimer > 0) moveMult *= WOBBLE_SPEED_MULT;
    this.x += this.vx * moveMult * dt / 16;
    this.y += this.vy * moveMult * dt / 16;
    this.vx *= friction;
    this.vy *= friction;
    if (Math.abs(this.vx) < 0.01) this.vx = 0;
    if (Math.abs(this.vy) < 0.01) this.vy = 0;

    // Phase 1B: Vertical bounce (visual offset, no Y-axis gameplay impact)
    if (this.bounceVy !== 0 || this.bounceY < 0) {
      this.bounceVy += BOUNCE_GRAVITY * dt / 16;
      this.bounceY += this.bounceVy * dt / 16;
      if (this.bounceY >= 0) {
        this.bounceY = 0;
        // Spawn dust burst on landing
        if (Math.abs(this.bounceVy) > 0.5 && game) {
          game.particles.dust(this.x, this.y + 6);
          game.particles.dust(this.x - 6, this.y + 6);
          game.particles.dust(this.x + 6, this.y + 6);
        }
        this.bounceVy = 0;
      }
    }

    // Dust when walking
    if (this.state === STATES.WALK) {
      this.dustTimer += dt;
      if (this.dustTimer > 200) {
        this.dustTimer -= 200;
        if (game) game.particles.dust(this.x, this.y + 6);
      }
    }

    // State-specific animation updates
    switch (this.state) {
      case STATES.IDLE:
        this._updateAnim(dt, ANIM_IDLE_SPD, 2, true);
        break;
      case STATES.WALK:
        this._updateAnim(dt, ANIM_WALK_SPD, this.charDef.walkFrames, true);
        break;
      case STATES.JAB:
        this._updateAttackAnim(dt, ANIM_JAB_SPD, this.charDef.jabFrames, 'jab');
        break;
      case STATES.HOOK:
        this._updateAttackAnim(dt, ANIM_HOOK_SPD, this.charDef.hookFrames, 'hook');
        break;
      case STATES.SHOVE:
        this._updateAttackAnim(dt, ANIM_JAB_SPD, this.charDef.jabFrames, 'shove');
        break;
      case STATES.BLOCK:
        this.animFrame = Math.min(2, this.charDef.blockFrames > 0 ? 2 : 0);
        break;
      case STATES.HIT:
        this._updateAnim(dt, ANIM_HIT_SPD, this.charDef.hitFrames, false);
        if (this.animFrame >= this.charDef.hitFrames - 1 && this.stateTimer > ANIM_HIT_SPD * this.charDef.hitFrames) {
          this.setState(STATES.IDLE);
        }
        break;
      case STATES.KNOCKDOWN:
        this._updateAnim(dt, 100, this.charDef.hitFrames, false);
        if (this.stateTimer > 800) this.setState(STATES.IDLE);
        break;
      case STATES.KO:
        this.animFrame = Math.max(0, this.charDef.hitFrames - 1);
        this.koTimer -= dt;
        break;
      case STATES.SLIP:
        // Use walk frame 0 (ducking pose) — visually the sprite squishes down
        this.animFrame = 0;
        break;
    }
  }

  _updateAnim(dt, speed, frameCount, loop) {
    this.animTimer += dt;
    if (this.animTimer >= speed) {
      this.animTimer -= speed;
      this.animFrame++;
      if (loop) {
        this.animFrame = this.animFrame % frameCount;
      } else {
        this.animFrame = Math.min(this.animFrame, frameCount - 1);
      }
    }
  }

  _updateAttackAnim(dt, speed, frameCount, attackType) {
    this.animTimer += dt;
    if (this.animTimer >= speed) {
      this.animTimer -= speed;
      this.animFrame++;

      if (this.animFrame >= frameCount) {
        // Phase 1C: Set recovery cooldown based on attack type
        this.recoveryCooldown = MOVE_DEFS[attackType] ? MOVE_DEFS[attackType].recovery :
          (attackType === 'hook' ? HOOK_RECOVERY_MS : JAB_RECOVERY_MS);
        // Batch 4: Whiff backstep — drift backward on miss
        if (!this.lastAttackHit && attackType !== 'shove') {
          SFX.whiff();
          const backstepDir = this.target ?
            Math.atan2(this.y - this.target.y, this.x - this.target.x) :
            (this.facing === 1 ? Math.PI : 0);
          this.vx += Math.cos(backstepDir) * WHIFF_BACKSTEP;
          this.vy += Math.sin(backstepDir) * WHIFF_BACKSTEP;
        }
        this._isCounterAttack = false;
        this.setState(STATES.IDLE);
        return;
      }
    }

    // Determine active frames (middle frames have hitbox)
    const startupEnd = Math.max(1, Math.floor(frameCount * 0.25));
    const activeEnd = Math.max(startupEnd + 1, Math.floor(frameCount * 0.75));
    this.hitboxActive = this.animFrame >= startupEnd && this.animFrame < activeEnd;
  }

  draw(ctx, cam) {
    const drawX = this.x;
    // Idle breathing — subtle Y oscillation when standing still
    let breathOffset = 0;
    if (this.state === STATES.IDLE && this.alive) {
      breathOffset = Math.sin(Date.now() * 0.003 + this.x * 0.1) * 1.2;
    }
    const drawY = this.y + this.bounceY + breathOffset; // Phase 1B: vertical bounce offset + breathing

    // Shadow — dark ellipse under feet
    if (this.alive || this.state === STATES.KO) {
      const shadowAlpha = this.state === STATES.KO ? 0.12 : 0.2;
      const shadowScale = this.state === STATES.KNOCKDOWN ? 1.3 : 1;
      ctx.globalAlpha = shadowAlpha;
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.ellipse(Math.floor(this.x), Math.floor(this.y + FRAME_H * SCALE / 2 - 2), 16 * shadowScale, 6 * shadowScale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Determine which sprite sheet to use
    let sheetKey, frameCount;
    switch (this.state) {
      case STATES.IDLE:
        sheetKey = this.charDef.walk;
        frameCount = this.charDef.walkFrames;
        break;
      case STATES.WALK:
        sheetKey = this.charDef.walk;
        frameCount = this.charDef.walkFrames;
        break;
      case STATES.JAB:
        sheetKey = this.charDef.jab;
        frameCount = this.charDef.jabFrames;
        break;
      case STATES.HOOK:
        sheetKey = this.charDef.hook;
        frameCount = this.charDef.hookFrames;
        break;
      case STATES.SHOVE:
        sheetKey = this.charDef.jab;
        frameCount = this.charDef.jabFrames;
        break;
      case STATES.BLOCK:
        sheetKey = this.charDef.block || this.charDef.walk;
        frameCount = this.charDef.blockFrames || this.charDef.walkFrames;
        break;
      case STATES.HIT:
      case STATES.KNOCKDOWN:
      case STATES.KO:
        sheetKey = this.charDef.hit;
        frameCount = this.charDef.hitFrames;
        break;
      case STATES.SLIP:
        sheetKey = this.charDef.walk;
        frameCount = this.charDef.walkFrames;
        break;
      default:
        sheetKey = this.charDef.walk;
        frameCount = this.charDef.walkFrames;
    }

    const sheet = assets[sheetKey];
    if (!sheet) return;

    const frame = clamp(this.animFrame, 0, frameCount - 1);
    const srcX = frame * FRAME_W;
    const srcY = 0;
    const srcW = FRAME_W;
    const srcH = Math.min(FRAME_H, sheet.height);

    ctx.save();
    ctx.translate(Math.floor(drawX), Math.floor(drawY));

    // Hit flash effect
    if (this.hitFlash > 0 && this.hitFlash % 2 === 0) {
      ctx.filter = 'brightness(3)';
    }

    // KO tint
    if (this.state === STATES.KO) {
      ctx.globalAlpha = 0.6;
    }

    // Batch 1: Knockdown — squash sprite to look like they're on the ground
    if (this.state === STATES.KNOCKDOWN) {
      ctx.globalAlpha = 0.8;
      ctx.scale(1, 0.35); // flatten vertically
      ctx.translate(0, FRAME_H * SCALE * 0.8); // shift down
    }

    // Batch 1: Get-up animation — stretching back up
    if (this.state === STATES.GETUP) {
      const t = Math.min(1, this.stateTimer / 400);
      const yScale = 0.35 + t * 0.65;
      ctx.scale(1, yScale);
      ctx.translate(0, FRAME_H * SCALE * (1 - yScale) * 0.5);
    }

    // Batch 4: Slip — duck down, squish sprite to show dodging
    if (this.state === STATES.SLIP) {
      const slipT = 1 - (this.slipTimer / SLIP_DURATION); // 0→1
      const duckAmount = Math.sin(slipT * Math.PI); // smooth arc: up→duck→up
      ctx.scale(1.15, 1 - duckAmount * 0.4); // widen slightly, squish down 40%
      ctx.translate(0, FRAME_H * SCALE * duckAmount * 0.35); // shift down
    }

    // Flip for facing direction
    if (this.facing === -1) {
      ctx.scale(-1, 1);
    }

    // Draw sprite centered
    const dw = FRAME_W * SCALE;
    const dh = srcH * SCALE;
    ctx.drawImage(sheet, srcX, srcY, srcW, srcH, -dw/2, -dh/2, dw, dh);

    // Phase 4: Injury tint overlay — reddish bruising
    if (this.injuries > 25) {
      const injAlpha = Math.min(0.3, (this.injuries - 25) / 200);
      ctx.globalAlpha = injAlpha;
      ctx.fillStyle = '#880022';
      ctx.fillRect(-dw/2, -dh/2, dw, dh);
      ctx.globalAlpha = 1;
    }

    // Batch 4: Heat glow — fighter pulses warm when momentum is high
    if (this.heat > 25) {
      const heatIntensity = (this.heat - 25) / 75; // 0→1 over 25-100 range
      const pulse = 0.5 + Math.sin(Date.now() * 0.006) * 0.5; // slow pulse
      ctx.globalAlpha = heatIntensity * 0.15 * (0.7 + pulse * 0.3);
      ctx.fillStyle = this.heat > 70 ? '#ff4400' : '#ff8800';
      ctx.fillRect(-dw/2 - 2, -dh/2 - 2, dw + 4, dh + 4);
      ctx.globalAlpha = 1;
    }

    // Batch 5: Hit confirm — white outline flash when you land a clean hit
    if (this.hitConfirmTimer > 0) {
      const t = this.hitConfirmTimer / HIT_CONFIRM_DURATION;
      ctx.globalAlpha = t * 0.6;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(-dw/2 - 1, -dh/2 - 1, dw + 2, dh + 2);
      ctx.globalAlpha = 1;
    }

    // Batch 5: Failed input — brief red tint when attack can't execute
    if (this.failedInputTimer > 0) {
      const t = this.failedInputTimer / FAILED_INPUT_FLASH;
      ctx.globalAlpha = t * 0.25;
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-dw/2, -dh/2, dw, dh);
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Post-knockdown wobble visual — sway
    if (this.wobbleTimer > 0 && this.state !== STATES.KNOCKDOWN && this.state !== STATES.KO) {
      const wobbleIntensity = clamp(this.wobbleTimer / WOBBLE_DURATION, 0, 1);
      const sway = Math.sin(Date.now() * 0.008) * 2 * wobbleIntensity;
      // Draw small wobble lines above head
      ctx.strokeStyle = `rgba(255,220,100,${0.3 * wobbleIntensity})`;
      ctx.lineWidth = 1;
      const wy = drawY - FRAME_H * SCALE / 2 - 14;
      ctx.beginPath();
      ctx.moveTo(drawX - 8 + sway, wy);
      ctx.quadraticCurveTo(drawX + sway * 2, wy - 3, drawX + 8 + sway, wy);
      ctx.stroke();
    }

    // Batch 2: Stagger visual — wobble + stars
    if (this.isStaggered) {
      const wobble = Math.sin(Date.now() * 0.02) * 3;
      const starY = drawY - dh/2 - 12;
      ctx.fillStyle = '#ffdd44';
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.01) * 0.3;
      for (let s = 0; s < 3; s++) {
        const starAng = Date.now() * 0.005 + s * (Math.PI * 2 / 3);
        const sx = drawX + Math.cos(starAng) * 12;
        const sy = starY + Math.sin(starAng) * 4;
        ctx.fillRect(Math.floor(sx) - 1, Math.floor(sy) - 1, 3, 3);
      }
      ctx.globalAlpha = 1;
    }

    // Gang color circle under feet
    if (this.gangId) {
      const gc = GANG_COLORS[this.gangId];
      if (gc) {
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = gc.primary;
        ctx.beginPath();
        ctx.ellipse(Math.floor(drawX), Math.floor(drawY + dh/2 - 4), 14, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // Player indicator - arrow + glow
    if (this.isPlayer) {
      const indY = drawY - dh/2 - 10;
      // Glow
      ctx.fillStyle = 'rgba(255,208,128,0.3)';
      ctx.beginPath();
      ctx.ellipse(Math.floor(drawX), Math.floor(drawY + dh/2 - 4), 18, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Arrow
      ctx.fillStyle = '#ffd080';
      ctx.beginPath();
      ctx.moveTo(drawX - 5, indY);
      ctx.lineTo(drawX, indY - 7);
      ctx.lineTo(drawX + 5, indY);
      ctx.closePath();
      ctx.fill();
    }

    // Batch 5: Combo counter display
    if (this.comboCount >= 2 && this.comboDisplayTimer > 0) {
      const alpha = Math.min(1, this.comboDisplayTimer / 300);
      const bobY = Math.sin(Date.now() * 0.008) * 2;
      const cx = drawX + (this.facing === 1 ? 28 : -28);
      const cy = drawY - dh/2 - 8 + bobY;
      ctx.save();
      ctx.globalAlpha = alpha * 0.9;
      ctx.font = '7px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      // Shadow
      ctx.fillStyle = '#000';
      ctx.fillText(`${this.comboCount}x`, cx + 1, cy + 1);
      // Color — escalates with combo
      ctx.fillStyle = this.comboCount >= 5 ? '#ff4444' : this.comboCount >= 3 ? '#ffaa00' : '#ffdd44';
      ctx.fillText(`${this.comboCount}x`, cx, cy);
      ctx.restore();
    }
  }

  drawHealthBar(ctx, cam) {
    if (this.state === STATES.KO && this.koTimer <= 0) return;
    const barW = 40;
    const barH = 4;
    const bx = this.x - barW / 2;
    const by = this.y - FRAME_H * SCALE / 2 - 8;
    const healthPct = this.health / this.maxHealth;

    // Background
    ctx.fillStyle = '#1a1111';
    ctx.fillRect(Math.floor(bx - 1), Math.floor(by - 1), barW + 2, barH + 2);

    // Health
    const hColor = healthPct > 0.5 ? '#44aa44' : healthPct > 0.25 ? '#ccaa22' : '#cc2222';
    ctx.fillStyle = hColor;
    ctx.fillRect(Math.floor(bx), Math.floor(by), Math.ceil(barW * healthPct), barH);

    // Batch 1: Knockdown count indicator
    if (this.knockdownCount > 0 && this.alive) {
      const kdX = this.x - 10;
      const kdY = by - 6;
      for (let i = 0; i < MAX_KNOCKDOWNS; i++) {
        ctx.fillStyle = i < this.knockdownCount ? '#cc2222' : '#3a3530';
        ctx.fillRect(Math.floor(kdX + i * 7), Math.floor(kdY), 5, 3);
      }
    }

    // Batch 1: Clinch indicator
    if (this.inClinch) {
      ctx.fillStyle = '#ffaa44';
      ctx.font = '5px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CLINCH', this.x, by - 6);
    }

    // Batch 2: Stagger indicator
    if (this.isStaggered) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '5px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.008) * 0.3;
      ctx.fillText('DAZED', this.x, by - (this.inClinch ? 12 : 6));
      ctx.globalAlpha = 1;
    }

    // Batch 1: Get-up progress bar during knockdown
    if (this.state === STATES.KNOCKDOWN && this.isDown && this.isPlayer) {
      const progW = 30;
      const progH = 4;
      const progX = this.x - progW / 2;
      const progY = this.y + 20;
      const needed = GETUP_TAPS_NEEDED + (this.knockdownCount - 1) * 2;
      const pct = this.getupTaps / needed;
      ctx.fillStyle = '#1a1111';
      ctx.fillRect(Math.floor(progX), Math.floor(progY), progW, progH);
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(Math.floor(progX), Math.floor(progY), Math.ceil(progW * pct), progH);
      ctx.strokeStyle = '#3a2a1a';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(Math.floor(progX), Math.floor(progY), progW, progH);
      // "MASH!" text
      ctx.fillStyle = '#ffdd44';
      ctx.font = '4px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
      ctx.fillText('MASH!', this.x, progY + 10);
      ctx.globalAlpha = 1;
    }

    // Phase 3: Fear/broken indicator
    if (this.broken) {
      ctx.fillStyle = '#ff4444';
      ctx.font = '4px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.008) * 0.3;
      ctx.fillText('!!', this.x, by - 3);
      ctx.globalAlpha = 1;
    } else if (this.fear > this.fearThreshold * 0.7) {
      ctx.fillStyle = '#ffaa44';
      ctx.font = '4px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.4;
      ctx.fillText('!', this.x, by - 3);
      ctx.globalAlpha = 1;
    }
  }
}

// COLLISION
// ============================================================
function boxOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function resolveFighterCollisions(fighters) {
  for (let i = 0; i < fighters.length; i++) {
    for (let j = i + 1; j < fighters.length; j++) {
      const a = fighters[i];
      const b = fighters[j];
      if (a.state === STATES.KO || b.state === STATES.KO) continue;
      if (a.state === STATES.KNOCKDOWN || b.state === STATES.KNOCKDOWN) continue;
      // Don't separate fighters in clinch with each other
      if (a.inClinch && a.clinchPartner === b) continue;
      if (b.inClinch && b.clinchPartner === a) continue;
      const d = dist(a, b);
      const minDist = 36;
      if (d < minDist && d > 0) {
        const overlap = (minDist - d) / 2;
        const nx = (b.x - a.x) / d;
        const ny = (b.y - a.y) / d;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;
      }

      // Batch 1: Clinch detection — enemies close together for long enough
      if (d < CLINCH_DISTANCE && a.gangId !== b.gangId &&
          a.alive && b.alive &&
          !a.inClinch && !b.inClinch &&
          a.clinchCooldown <= 0 && b.clinchCooldown <= 0 &&
          a.canAct && b.canAct &&
          a.state !== STATES.BLOCK && b.state !== STATES.BLOCK) {
        // Track proximity time on the first fighter
        a.clinchProximityTimer += 16; // approximate dt
        if (a.clinchProximityTimer >= CLINCH_TIME_NEEDED) {
          a.clinchProximityTimer = 0;
          b.clinchProximityTimer = 0;
          a.enterClinch(b);
          b.enterClinch(a);
          // Face each other
          a.facing = b.x > a.x ? 1 : -1;
          b.facing = a.x > b.x ? 1 : -1;
        }
      } else {
        a.clinchProximityTimer = Math.max(0, a.clinchProximityTimer - 8);
      }
    }
  }
}

// ============================================================
// COMBAT SYSTEM
// ============================================================
function processCombat(attackers, defenders, particles, camera) {
  for (const attacker of attackers) {
    if (attacker.state !== STATES.JAB && attacker.state !== STATES.HOOK && attacker.state !== STATES.SHOVE) continue;
    if (!attacker.hitboxActive) continue;

    const hitbox = attacker.getHitbox();
    if (!hitbox) continue;

    for (const defender of defenders) {
      if (defender === attacker) continue;
      if (attacker.gangId && attacker.gangId === defender.gangId) continue;
      if (attacker.hitTargets.has(defender)) continue;
      if (defender.invulnFrames > 0) continue;

      // Post-KO hits — 1v1/cell: unlimited beating. Riot: 1.5s then scenery
      if (defender.state === STATES.KO) {
        const isRiot = game && game.mode === 'riot';
        if (isRiot && defender.koTimer < KO_DURATION - 1500) continue; // riot: stop after 1.5s
        const hurtbox = defender.getHurtbox();
        if (!boxOverlap(hitbox, hurtbox)) continue;
        attacker.hitTargets.add(defender);
        // Ragdoll knockback — body gets shoved around
        const knockDir = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
        const isHook = attacker.state === STATES.HOOK;
        defender.vx += Math.cos(knockDir) * (isHook ? 6 : 3);
        defender.vy += Math.sin(knockDir) * (isHook ? 6 : 3);
        defender.hitFlash = 4;
        // Particles + sound
        const hitX = (attacker.x + defender.x) / 2 + attacker.facing * 8;
        const hitY = (attacker.y + defender.y) / 2;
        particles.blood(hitX, hitY, attacker.facing, isHook ? 1.2 : 0.6);
        particles.impact(hitX, hitY);
        if (isHook) { SFX.hookHit(0.7); } else { SFX.punchHit(0.7); }
        camera.shake(isHook ? 3 : 1.5, 80, Math.cos(knockDir), Math.sin(knockDir));
        attacker.hitConfirmTimer = HIT_CONFIRM_DURATION;
        attacker.lastAttackHit = true;
        continue; // skip normal damage processing
      }

      const hurtbox = defender.getHurtbox();
      if (!boxOverlap(hitbox, hurtbox)) continue;

      // HIT!
      attacker.hitTargets.add(defender);

      const isHook = attacker.state === STATES.HOOK;
      const isShove = attacker.state === STATES.SHOVE;

      // Slip dodge — hooks always miss, jabs miss if timed in first 120ms of slip
      if (defender.isSlipping && !isShove) {
        const slipElapsed = SLIP_DURATION - defender.slipTimer;
        const jabDodge = !isHook && slipElapsed < 120; // tight window — duck under jab
        if (isHook || jabDodge) {
          if (game && game.dmgNumbers) {
            game.dmgNumbers.add(defender.x, defender.y - FRAME_H * SCALE / 2 - 12, 0, false, false,
              jabDodge ? 'DUCK!' : 'SLIP!');
          }
          if (game && game.announcer && (defender.isPlayer || attacker.isPlayer)) {
            game.announcer.show(jabDodge ? 'DUCKED IT!' : 'SLIPPED!', '', 600);
          }
          SFX.whiff();
          continue;
        }
      }

      const moveDef = isShove ? MOVE_DEFS.shove : (isHook ? MOVE_DEFS.hook : MOVE_DEFS.jab);
      const baseDmg = moveDef.damage;
      const baseKnock = moveDef.knockback;
      // Phase 2: low stamina weakens damage
      const staminaMult = attacker.stamina < LOW_STAMINA_THRESHOLD ? LOW_STAMINA_DAMAGE_MULT : 1;
      // Fear weakens the attacker's commitment
      const fearWeakness = attacker.fear > 0 ? 1 - (attacker.fear / attacker.maxFear) * 0.25 : 1;

      // Batch 4: Heat damage bonus
      const heatMult = 1 + (attacker.heat / HEAT_MAX) * HEAT_DAMAGE_BONUS;
      // Batch 4: Counter-attack bonus
      const counterMult = attacker._isCounterAttack ? SLIP_COUNTER_DAMAGE_MULT : 1;
      // Batch 4: Corner pressure — defender near arena edge takes more
      let cornerMult = 1;
      if (game) {
        const arenaW = game.mode === 'cell' ? YARD_CELL_W : game.yardWidth || 800;
        const arenaH = game.mode === 'cell' ? YARD_CELL_H : game.yardHeight || 500;
        const edgeDist = Math.min(defender.x, arenaW - defender.x, defender.y, arenaH - defender.y);
        if (edgeDist < CORNER_PRESSURE_DIST) {
          cornerMult = CORNER_PRESSURE_DMG_MULT;
        }
      }

      const damage = baseDmg * attacker.damageMult * staminaMult * fearWeakness * heatMult * counterMult * cornerMult;
      const knockDir = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
      const knockForce = baseKnock;

      const result = defender.takeDamage(damage, knockDir, knockForce, attacker, isHook);
      if (!result) continue;

      // Combo tracking
      attacker.comboCount++;
      attacker.comboTimer = 1000;

      // Phase 4: Stats tracking
      attacker.hitsLanded++;
      attacker.damageDealt += result.damage;
      if (defender.state === STATES.KO) attacker.knockdowns++;
      attacker.lastAttackHit = true; // Batch 4: whiff tracking

      // Batch 5: Hit confirm flash + combo display
      if (!result.blocked) {
        attacker.hitConfirmTimer = HIT_CONFIRM_DURATION;
        attacker.comboDisplayTimer = COMBO_DISPLAY_DURATION;
      }

      // Batch 4: Heat gain on successful hit
      if (!result.blocked) {
        const heatGain = isHook ? HEAT_GAIN_HOOK : HEAT_GAIN_PER_HIT;
        attacker.heat = Math.min(HEAT_MAX, attacker.heat + heatGain);
        attacker.heatDecayTimer = 0;
      }

      // Batch 4: Counter-attack announcement
      if (attacker._isCounterAttack && !result.blocked) {
        attacker._isCounterAttack = false;
        if (game && game.announcer) {
          game.announcer.show('COUNTER!', '', 700);
        }
        // Extra fear on counter
        if (defender.alive) {
          defender.fear = Math.min(defender.maxFear, defender.fear + 8);
        }
      }

      // Batch 4: Corner pressure — extra fear when cornered
      if (cornerMult > 1 && !result.blocked && defender.alive) {
        const bonusFear = moveDef.fearDamage * (CORNER_PRESSURE_FEAR_MULT - 1);
        defender.fear = Math.min(defender.maxFear, defender.fear + bonusFear);
      }

      // Phase 4: Floating damage numbers
      if (game && game.dmgNumbers) {
        const numY = defender.y - FRAME_H * SCALE / 2 - 12;
        game.dmgNumbers.add(defender.x, numY, result.damage, result.blocked, isHook && !result.blocked);
      }

      // Phase 1A: Asymmetric time-based hitstop
      const isKO = defender.state === STATES.KO;
      let hitstopMs = moveDef.hitstop;
      if (isKO) hitstopMs = KO_HITSTOP; // long dramatic freeze on KO
      defender.hitstopDuration = hitstopMs;
      defender.hitstopTimer = 0;
      attacker.hitstopDuration = hitstopMs * HITSTOP_ATTACKER_MULT;
      attacker.hitstopTimer = 0;

      // Phase 1B: Set knockback deceleration curve
      if (!result.blocked) {
        const kbDur = isHook ? KNOCKBACK_DURATION_HOOK : KNOCKBACK_DURATION_JAB;
        defender.knockbackDuration = kbDur;
        defender.knockbackTimer = 0;
        // Vertical bounce on hooks
        if (isHook) {
          defender.bounceVy = HOOK_VERTICAL_BOUNCE;
          defender.bounceY = 0;
        }
        // Batch 5: Impact dust at feet
        particles.impactDust(defender.x, defender.y);
      }

      // Particles
      const hitX = (attacker.x + defender.x) / 2 + attacker.facing * 8;
      const hitY = (attacker.y + defender.y) / 2;

      // Phase 2/4: directional shake + zoom punch, scaled by distance from player
      const shDirX = Math.cos(knockDir);
      const shDirY = Math.sin(knockDir);

      // Phase 4: Scale camera effects by proximity to player
      let camScale = 1;
      if (game && game.player && game.player.alive) {
        const dToPlayer = dist({x: hitX, y: hitY}, game.player);
        const isInvolved = attacker.isPlayer || defender.isPlayer;
        if (!isInvolved) {
          // Far-away fights cause less screen disruption
          camScale = clamp(1 - (dToPlayer - 80) / 200, 0.1, 1);
        }
      }

      if (result.blocked) {
        particles.impact(hitX, hitY);
        camera.shake(2 * camScale, 80, shDirX, shDirY);
        SFX.blockHit();
      } else {
        const intensity = isHook ? 1.5 : 0.8;
        particles.blood(hitX, hitY, attacker.facing, intensity);
        particles.impact(hitX, hitY);
        camera.shake((isHook ? 6 : 3) * camScale, isHook ? 200 : 100, shDirX, shDirY);

        // Sound — jab vs hook vs shove
        if (isShove) {
          SFX.shove();
        } else if (isHook) {
          SFX.hookHit(camScale);
        } else {
          SFX.punchHit(camScale);
        }

        // Phase 2: Zoom punch + screen flash on hooks
        if (isHook) {
          camera.zoomPunch(0.06 * camScale, 180);
          if (game) game.hitFlashAlpha = 0.08 * camScale;
          particles.speedLines(hitX, hitY, shDirX, shDirY);
        }

        // Blood pool on KO
        if (isKO) {
          SFX.koHit();
          SFX.crowdRoar(camScale);
          particles.bloodPool(defender.x, defender.y + 4);
          camera.shake(10 * camScale, 350, shDirX, shDirY);
          camera.zoomPunch(0.12 * camScale, 350);
          if (game) game.hitFlashAlpha = 0.2 * camScale;

          // Phase 3: Witnessing a KO spreads fear to nearby fighters
          if (game) {
            for (const f of game.fighters) {
              if (!f.alive || f === attacker || f === defender) continue;
              const dToKO = dist(f, defender);
              if (dToKO < 120) {
                if (f.gangId === defender.gangId) {
                  f.fear = Math.min(f.maxFear, f.fear + 25 * (1 - f.traits.toughness * 0.4));
                } else if (f.gangId === attacker.gangId) {
                  f.fear = Math.max(0, f.fear - 15);
                }
              }
            }
          }
        }
      }

      // Shove wall-splat check
      if (attacker.state === STATES.SHOVE && !result.blocked && game) {
        const wallMargin = 35;
        const nearWall = defender.x < wallMargin || defender.x > game.worldW - wallMargin ||
                         defender.y < wallMargin || defender.y > game.worldH - wallMargin;
        if (nearWall) {
          defender.knockDown();
          camera.shake(10, 300, shDirX, shDirY);
          game.hitFlashAlpha = 0.15;
          game.announcer.show('WALL SPLAT!', '', 800);
          defender.fear = Math.min(defender.maxFear, defender.fear + 20);
        }
      }
    }
  }
}

// AI CONTROLLER
// ============================================================
// Phase 1D: AI States
const AI_STATES = {
  SIZING_UP: 'sizing_up',   // Circling, reading opponent (1.5-4s)
  PRESSING: 'pressing',      // Aggressive attacks, combos (0.5-2s)
  RECOVERING: 'recovering',  // Backing off after an exchange (0.5-1.5s)
  CORNERED: 'cornered'       // Near wall/desperate, wild swings
};

class AIController {
  constructor(fighter, difficulty = 0.5) {
    this.fighter = fighter;
    this.difficulty = difficulty;
    this.state = AI_STATES.SIZING_UP;
    this.stateTimer = 0;
    this.stateDuration = 2000 + Math.random() * 2000;

    // Movement
    this.strafeDir = Math.random() > 0.5 ? 1 : -1;
    this.strafeTimer = 0;

    // Momentum system (0-100): builds from landing hits, decays over time
    this.momentum = 0;

    // Combo tracking for PRESSING state
    this.comboStep = 0;       // current position in combo pattern
    this.comboDelay = 0;      // ms until next attack in combo
    this.comboPattern = null;  // e.g. ['jab','jab','hook']

    // Reaction timers
    this.blockReactTimer = 0;
    this.lastTargetState = null;
  }

  _switchState(newState) {
    this.state = newState;
    this.stateTimer = 0;
    const p = this.fighter.personality;
    switch (newState) {
      case AI_STATES.SIZING_UP:
        // Phase 4: Tightened sizing-up — AI was too passive
        let sizeUpBase = 800;
        if (p === 'brawler' || p === 'swarmer') sizeUpBase = 500;
        else if (p === 'counterpuncher') sizeUpBase = 1200;
        else if (p === 'coward') sizeUpBase = 1000;
        this.stateDuration = sizeUpBase + Math.random() * 1200 * (1 - this.difficulty * 0.5);
        this.strafeDir = Math.random() > 0.5 ? 1 : -1;
        break;
      case AI_STATES.PRESSING:
        // Brawlers press longer, counterpunchers hit and pull back
        let pressBase = 600;
        if (p === 'brawler' || p === 'bully') pressBase = 1000;
        else if (p === 'counterpuncher') pressBase = 400;
        else if (p === 'swarmer') pressBase = 800;
        this.stateDuration = pressBase + Math.random() * 1500;
        this._pickCombo();
        break;
      case AI_STATES.RECOVERING:
        let recoverBase = 400;
        if (p === 'coward') recoverBase = 700;
        else if (p === 'brawler') recoverBase = 250;
        this.stateDuration = recoverBase + Math.random() * 800;
        break;
      case AI_STATES.CORNERED:
        this.stateDuration = 600 + Math.random() * 600;
        break;
    }
  }

  _pickCombo() {
    const p = this.fighter.personality;
    let patterns;

    // Phase 3: Personality-specific combo preferences
    switch (p) {
      case 'brawler':
        patterns = [['jab','hook'], ['hook','hook'], ['jab','jab','hook'], ['hook'], ['jab','shove']];
        break;
      case 'swarmer':
        patterns = [['jab','jab','jab'], ['jab','jab'], ['jab','jab','jab','hook'], ['jab','jab','jab','jab']];
        break;
      case 'slugger':
        patterns = [['hook'], ['jab','hook'], ['hook','hook']];
        break;
      case 'counterpuncher':
        patterns = [['jab'], ['jab','hook'], ['jab','jab']];
        break;
      case 'bully':
        patterns = [['jab','jab','hook'], ['hook'], ['jab','hook','hook'], ['shove','jab'], ['jab','shove']];
        break;
      case 'coward':
        patterns = [['jab'], ['jab','jab'], ['jab']];
        break;
      default: // balanced
        patterns = [['jab'], ['jab','jab'], ['jab','jab','hook'], ['jab','hook'], ['hook'], ['jab','jab','jab']];
        break;
    }

    const maxIdx = Math.min(patterns.length - 1, Math.floor(1 + this.difficulty * (patterns.length - 1)));
    this.comboPattern = patterns[randInt(0, maxIdx)];
    this.comboStep = 0;
    this.comboDelay = 80 + Math.random() * 60;
  }

  update(dt, target) {
    const f = this.fighter;

    // Handle auto-unblock timer
    if (f._autoUnblockTimer > 0) {
      f._autoUnblockTimer -= dt;
      if (f._autoUnblockTimer <= 0) {
        f.unblock();
        f._autoUnblockTimer = 0;
      }
    }

    if (!f.alive || f.isActing) return;
    if (f.hitstopDuration > 0) return;
    if (f.recoveryCooldown > 0) return;

    f.target = target;
    if (!target || target.state === STATES.KO) {
      f.vx = 0; f.vy = 0;
      if (f.state === STATES.WALK) f.setState(STATES.IDLE);
      return;
    }

    // Batch 1: AI clinch behavior
    if (f.inClinch) {
      f.clinchTimer += 0; // timer handled in Fighter.update
      // Personality determines clinch strategy
      if (f.personality === 'bully' || f.personality === 'brawler') {
        // Dirty boxers — gut shot repeatedly
        if (Math.random() < 0.03 * this.difficulty) f.clinchGutShot();
        // Shove after a few gut shots
        if (f.clinchTimer > 1500 && Math.random() < 0.02) f.clinchShove();
      } else if (f.personality === 'swarmer') {
        // Swarmers throw rapid gut shots
        if (Math.random() < 0.05 * this.difficulty) f.clinchGutShot();
      } else {
        // Others try to break free relatively quickly
        if (f.clinchTimer > 600 && Math.random() < 0.03) {
          if (f.stamina >= CLINCH_BREAK_STAMINA) {
            f.stamina -= CLINCH_BREAK_STAMINA;
            f.breakClinch();
          }
        }
        // But throw some gut shots while in there
        if (Math.random() < 0.02 * this.difficulty) f.clinchGutShot();
      }
      return;
    }

    // Batch 1: AI knockdown state — just wait
    if (f.state === STATES.KNOCKDOWN || f.state === STATES.GETUP) return;

    const d = dist(f, target);
    f.faceTarget();

    this.stateTimer += dt;
    this.strafeTimer += dt;

    // Decay momentum over time
    this.momentum = Math.max(0, this.momentum - dt * 0.02);

    // Boost momentum when landing hits
    if (f.comboCount > 0 && f.comboTimer > 900) {
      this.momentum = Math.min(100, this.momentum + 15);
    }

    // Phase 3: Broken fighters flee instead of fighting
    if (f.broken && f.personality !== 'brawler') {
      // Run away from target
      const fleeAng = Math.atan2(f.y - target.y, f.x - target.x);
      f.vx = Math.cos(fleeAng) * f.moveSpeed * 0.8;
      f.vy = Math.sin(fleeAng) * f.moveSpeed * 0.8;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);
      // Desperate swing if cornered and enemy close
      if (d < 40 && Math.random() < 0.03) f.jab();
      return;
    }

    // Phase 3: Bully personality targets weaker/hurt opponents
    if (f.personality === 'bully' && target.health > target.maxHealth * 0.6 && !target.broken) {
      // Look for a weaker target if available
      if (game && game.fighters) {
        const weakTarget = game.fighters.find(other =>
          other !== f && other.alive && other.gangId !== f.gangId &&
          (other.health < other.maxHealth * 0.4 || other.broken) &&
          dist(f, other) < 150
        );
        if (weakTarget) {
          f.target = weakTarget;
          // Will use this target for the rest of the frame
        }
      }
    }

    // Check if cornered (near wall)
    const wallMargin = 60;
    const nearWall = f.x < wallMargin || f.x > (game ? game.worldW - wallMargin : 9999) ||
                     f.y < wallMargin || f.y > (game ? game.worldH - wallMargin : 9999);

    // Batch 4: Reactive slip — AI reads incoming hooks and tries to slip
    let slipChance = 0.015 * this.difficulty;
    if (f.personality === 'counterpuncher') slipChance *= 3;
    else if (f.personality === 'swarmer') slipChance *= 1.5;
    else if (f.personality === 'brawler') slipChance *= 0.3;
    if (target.state === STATES.HOOK && d < 70 && f.slipCooldown <= 0 &&
        f.state !== STATES.SLIP && Math.random() < slipChance) {
      f.slip();
      return; // committed to slip this frame
    }

    // Reactive blocking: if target is attacking and we're in range
    // Phase 3: counterpunchers block more, cowards block a lot
    let blockChance = 0.02 * this.difficulty;
    if (f.personality === 'counterpuncher') blockChance *= 2.5;
    else if (f.personality === 'coward') blockChance *= 2;
    else if (f.personality === 'brawler') blockChance *= 0.4;
    if (target.state === STATES.JAB || target.state === STATES.HOOK || target.state === STATES.SHOVE) {
      if (d < 70 && Math.random() < blockChance && this.state !== AI_STATES.PRESSING) {
        f.block();
        this.blockReactTimer = 150 + Math.random() * 200;
      }
    }
    if (this.blockReactTimer > 0) {
      this.blockReactTimer -= dt;
      if (this.blockReactTimer <= 0) {
        f.unblock();
        this.blockReactTimer = 0;
      }
      return;
    }

    // Batch 4: AI counter-attack after slip
    if (f.slipCounterWindow > 0 && f.canAttack && d < 65) {
      // Throw a quick counter — hooks are better counters but jabs are safer
      if (Math.random() < 0.6) {
        f.hook(); // big counter
      } else {
        f.jab(); // safe counter
      }
      return;
    }

    // Strafe direction changes
    if (this.strafeTimer > 1200 + Math.random() * 800) {
      this.strafeTimer = 0;
      this.strafeDir *= -1;
    }

    const attackRange = 55;

    // Phase 3: Fear affects willingness to press
    const fearMod = f.fear / f.maxFear; // 0-1

    // State transitions
    switch (this.state) {
      case AI_STATES.SIZING_UP:
        if (this.stateTimer >= this.stateDuration) {
          // Phase 3: Afraid fighters less likely to press
          const pressChance = fearMod < 0.5 ? 1 : (1 - fearMod);
          if ((d < attackRange + 20 || this.momentum > 40) && Math.random() < pressChance) {
            this._switchState(AI_STATES.PRESSING);
          } else {
            this._switchState(AI_STATES.SIZING_UP);
          }
        }
        // Got hit → briefly recover
        if (f.state === STATES.HIT) {
          this._switchState(AI_STATES.RECOVERING);
        }
        if (nearWall && d < attackRange + 30) {
          this._switchState(AI_STATES.CORNERED);
        }
        break;

      case AI_STATES.PRESSING:
        if (this.stateTimer >= this.stateDuration) {
          this._switchState(AI_STATES.RECOVERING);
        }
        if (f.state === STATES.HIT) {
          this._switchState(AI_STATES.RECOVERING);
        }
        if (d > attackRange + 60) {
          this._switchState(AI_STATES.SIZING_UP);
        }
        // Phase 2: Low stamina forces recovery
        if (f.stamina < LOW_STAMINA_THRESHOLD) {
          this._switchState(AI_STATES.RECOVERING);
        }
        break;

      case AI_STATES.RECOVERING:
        if (this.stateTimer >= this.stateDuration) {
          this._switchState(AI_STATES.SIZING_UP);
        }
        if (nearWall && d < attackRange) {
          this._switchState(AI_STATES.CORNERED);
        }
        break;

      case AI_STATES.CORNERED:
        if (this.stateTimer >= this.stateDuration) {
          if (!nearWall) {
            this._switchState(AI_STATES.SIZING_UP);
          } else {
            // Stay cornered but reset timer
            this._switchState(AI_STATES.CORNERED);
          }
        }
        break;
    }

    // State behaviors
    switch (this.state) {
      case AI_STATES.SIZING_UP:
        this._behaveSizingUp(dt, target, d, attackRange);
        break;
      case AI_STATES.PRESSING:
        this._behavePressing(dt, target, d, attackRange);
        break;
      case AI_STATES.RECOVERING:
        this._behaveRecovering(dt, target, d);
        break;
      case AI_STATES.CORNERED:
        this._behaveCornered(dt, target, d, attackRange);
        break;
    }
  }

  _behaveSizingUp(dt, target, d, attackRange) {
    const f = this.fighter;
    const p = f.personality;

    // Phase 3: Personality-specific preferred distances
    let preferredDist = 55 + (1 - this.difficulty) * 15;
    if (p === 'swarmer') preferredDist -= 10;       // wants to be closer
    else if (p === 'counterpuncher') preferredDist += 15; // keeps distance
    else if (p === 'coward') preferredDist += 20;
    else if (p === 'slugger') preferredDist -= 5;

    // Fear pushes preferred distance out
    preferredDist += (f.fear / f.maxFear) * 25;

    if (d > preferredDist + 30) {
      // Approach — speed based on personality
      const ang = angle(f, target);
      let approachSpd = 0.6;
      if (p === 'brawler' || p === 'swarmer') approachSpd = 0.75;
      else if (p === 'coward') approachSpd = 0.4;
      const spd = f.moveSpeed * approachSpd;
      f.vx = Math.cos(ang) * spd;
      f.vy = Math.sin(ang) * spd;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);
    } else {
      // Circle/strafe at fighting distance
      const angToTarget = angle(f, target);
      const strafeAng = angToTarget + Math.PI / 2 * this.strafeDir;
      let strafeSpd = 0.35;
      if (p === 'counterpuncher') strafeSpd = 0.45; // faster lateral movement
      const spd = f.moveSpeed * strafeSpd;

      const distCorrect = (d - preferredDist) * 0.03;

      f.vx = Math.cos(strafeAng) * spd + Math.cos(angToTarget) * distCorrect;
      f.vy = Math.sin(strafeAng) * spd + Math.sin(angToTarget) * distCorrect;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);

      // Phase 4: More aggressive probing — AI was too passive
      let probeChance = 0.008 * this.difficulty;
      if (p === 'swarmer') probeChance *= 2;
      if (p === 'brawler') probeChance *= 1.5;
      if (p === 'counterpuncher') probeChance *= 0.5;
      if (d < attackRange && Math.random() < probeChance) {
        const ang = angle(f, target);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.4;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.4;
        if (p === 'slugger' && Math.random() < 0.3) {
          f.hook();
        } else {
          f.jab();
        }
      }

      // Phase 4: Opportunistic attack — when target is in recovery or just whiffed
      if (d < attackRange + 10 && (target.recoveryCooldown > 0 || target.state === STATES.HIT)) {
        const ang = angle(f, target);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.6;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.6;
        if (Math.random() < 0.04 * this.difficulty) {
          if (p === 'counterpuncher' && Math.random() < 0.4) {
            f.hook(); // counterpunchers love to punish
          } else {
            f.jab();
          }
        }
      }
    }
  }

  _behavePressing(dt, target, d, attackRange) {
    const f = this.fighter;

    // If target is blocking, consider shoving
    if (target.state === STATES.BLOCK && d < attackRange && Math.random() < 0.04 * this.difficulty) {
      f.shove();
      return;
    }

    if (d > attackRange) {
      // Close distance aggressively
      const ang = angle(f, target);
      const spd = f.moveSpeed * (0.8 + this.difficulty * 0.2);
      f.vx = Math.cos(ang) * spd;
      f.vy = Math.sin(ang) * spd;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);
    } else {
      // In range — execute combo pattern
      this.comboDelay -= dt;
      if (this.comboDelay <= 0 && this.comboPattern && this.comboStep < this.comboPattern.length) {
        const move = this.comboPattern[this.comboStep];

        // Step toward target slightly
        const ang = angle(f, target);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.4;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.4;

        if (move === 'hook') {
          f.hook();
        } else if (move === 'shove') {
          f.shove();
        } else {
          f.jab();
        }

        this.comboStep++;
        // Phase 4: Tighter combo timing — less dead time between hits
        this.comboDelay = 60 + Math.random() * 80 * (1 - this.difficulty * 0.5);

        // If combo finished, pick a new one or keep pressing
        if (this.comboStep >= this.comboPattern.length) {
          if (Math.random() < 0.5 + this.momentum * 0.004) {
            this._pickCombo(); // chain into another combo
          }
        }
      } else if (this.comboDelay > 0) {
        // Between combo hits — step toward target to stay in range
        const ang = angle(f, target);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.3;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.3;
        if (f.state !== STATES.WALK) f.setState(STATES.WALK);
      }
    }
  }

  _behaveRecovering(dt, target, d) {
    const f = this.fighter;

    // Back away from target
    const ang = angle(f, target);
    const retreatAng = ang + Math.PI; // opposite direction
    const spd = f.moveSpeed * 0.5;

    // Add slight strafe while retreating
    const strafeComponent = Math.PI / 4 * this.strafeDir;

    f.vx = Math.cos(retreatAng + strafeComponent) * spd;
    f.vy = Math.sin(retreatAng + strafeComponent) * spd;
    if (f.state !== STATES.WALK) f.setState(STATES.WALK);

    // Desperate block if enemy is right on us
    if (d < 45 && Math.random() < 0.025 * this.difficulty) {
      f.block();
      f._autoUnblockTimer = 150 + Math.random() * 250;
    }
  }

  _behaveCornered(dt, target, d, attackRange) {
    const f = this.fighter;

    if (d < attackRange + 10) {
      // Desperate wild swings — faster, less calculated
      if (Math.random() < 0.04 + this.difficulty * 0.03) {
        const ang = angle(f, target);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.5;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.5;

        // Cornered fighters throw more hooks
        if (Math.random() < 0.5) {
          f.hook();
        } else {
          f.jab();
        }
      }
    } else {
      // Try to escape the wall — move toward center of yard
      const centerX = game ? game.worldW / 2 : 400;
      const centerY = game ? game.worldH / 2 : 250;
      const escapeAng = Math.atan2(centerY - f.y, centerX - f.x);
      f.vx = Math.cos(escapeAng) * f.moveSpeed * 0.7;
      f.vy = Math.sin(escapeAng) * f.moveSpeed * 0.7;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);
    }
  }
}

// GANG SYSTEM
// ============================================================
const GANG_STATES = {
  MILLING: 'milling',
  TENSING: 'tensing',
  ADVANCING: 'advancing',
  FIGHTING: 'fighting',
  RETREATING: 'retreating',
  RALLYING: 'rallying'   // Phase 3: regrouping after retreat
};

class Gang {
  constructor(id, homeX, homeY) {
    this.id = id;
    this.homeX = homeX;
    this.homeY = homeY;
    this.members = [];
    this.ais = [];
    this.state = GANG_STATES.MILLING;
    this.morale = 100;
    this.targetGang = null;
    this.stateTimer = 0;
    this.tensionTimer = 0;
    this.color = GANG_COLORS[id];

    // Phase 3: Narrative tracking
    this.lastKOAnnounced = 0;   // avoid spam
    this.koCount = 0;           // total KOs suffered
    this.killCount = 0;         // total KOs inflicted
    this.hasRallied = false;    // track if gang has rallied before
    this.firstBloodAnnounced = false;
  }

  get alive() { return this.members.some(m => m.alive); }
  get aliveCount() { return this.members.filter(m => m.alive).length; }
  get center() {
    const alive = this.members.filter(m => m.alive);
    if (alive.length === 0) return { x: this.homeX, y: this.homeY };
    const cx = alive.reduce((s, m) => s + m.x, 0) / alive.length;
    const cy = alive.reduce((s, m) => s + m.y, 0) / alive.length;
    return { x: cx, y: cy };
  }

  addMember(fighter, ai) {
    this.members.push(fighter);
    this.ais.push(ai);
    fighter.gangId = this.id;
  }

  assignRoles() {
    // Sort by aggression, top are vanguard
    const sorted = [...this.members].sort((a, b) => b.traits.aggression - a.traits.aggression);
    const vanguardCount = Math.ceil(sorted.length * 0.3);
    for (let i = 0; i < sorted.length; i++) {
      if (i < vanguardCount) sorted[i].gangRole = 'vanguard';
      else if (i < vanguardCount + Math.ceil(sorted.length * 0.4)) sorted[i].gangRole = 'fighter';
      else sorted[i].gangRole = 'follower';
    }
  }

  update(dt, allGangs, allFighters) {
    this.stateTimer += dt;
    this.tensionTimer += dt;

    // Update morale based on KOs and member fear
    const aliveRatio = this.aliveCount / this.members.length;
    const avgFear = this.members.filter(m => m.alive).reduce((sum, m) => sum + m.fear, 0) /
                    Math.max(1, this.aliveCount);
    const targetMorale = aliveRatio * 80 + (1 - avgFear / 100) * 20; // Phase 3: fear affects morale
    this.morale = lerp(this.morale, targetMorale, 0.015);

    // Phase 3: Fear propagation — when an ally gets KO'd, nearby members get scared
    const currentKOs = this.members.filter(m => !m.alive).length;
    if (currentKOs > this.koCount) {
      const newKOs = currentKOs - this.koCount;
      this.koCount = currentKOs;
      // Spread fear to living members
      for (const m of this.members) {
        if (!m.alive) continue;
        const fearSpread = newKOs * 15 * (1 - m.traits.toughness * 0.5);
        m.fear = Math.min(m.maxFear, m.fear + fearSpread);
        // Leadership reduces fear spread
        const leader = this.members.find(lm => lm.alive && lm.traits.leadership > 0.5);
        if (leader && leader !== m) {
          m.fear = Math.max(0, m.fear - leader.traits.leadership * 10);
        }
      }
      // Phase 3: Narrative — announce when a fighter goes down
      if (game && game.announcer && this.stateTimer - this.lastKOAnnounced > 2000) {
        const koFighter = this.members.find(m => !m.alive && m.state === STATES.KO);
        if (koFighter) {
          const gangName = GANG_COLORS[this.id].name;
          if (aliveRatio < 0.4) {
            game.announcer.show(`${gangName} BROKEN`, `${koFighter.name} is down!`, 1500);
          } else if (!this.firstBloodAnnounced) {
            game.announcer.show(`${koFighter.name} DOWN`, `${gangName} takes a loss`, 1200);
            this.firstBloodAnnounced = true;
          }
          this.lastKOAnnounced = this.stateTimer;
        }
      }
    }

    // Find nearest rival gang
    let nearestGang = null;
    let nearestDist = Infinity;
    for (const g of allGangs) {
      if (g === this || !g.alive) continue;
      const d = dist(this.center, g.center);
      if (d < nearestDist) { nearestDist = d; nearestGang = g; }
    }
    this.targetGang = nearestGang;

    // State transitions
    switch (this.state) {
      case GANG_STATES.MILLING:
        if (this.tensionTimer > 3000) {
          this.state = GANG_STATES.TENSING;
          this.stateTimer = 0;
        }
        break;
      case GANG_STATES.TENSING:
        if (this.stateTimer > 2000) {
          this.state = GANG_STATES.ADVANCING;
          this.stateTimer = 0;
          if (game && game.announcer) {
            const gangName = GANG_COLORS[this.id].name;
            // Only announce first gang to advance
            if (!allGangs.some(g => g !== this && g.state === GANG_STATES.ADVANCING)) {
              game.announcer.show(`${gangName} MOVES`, 'Things are heating up...', 1500);
            }
          }
        }
        break;
      case GANG_STATES.ADVANCING:
        // Check if any members are fighting
        if (this.members.some(m => m.alive && (m.state === STATES.HIT || m.state === STATES.JAB || m.state === STATES.HOOK))) {
          this.state = GANG_STATES.FIGHTING;
          this.stateTimer = 0;
        }
        break;
      case GANG_STATES.FIGHTING:
        if (this.morale < 25) {
          this.state = GANG_STATES.RETREATING;
          this.stateTimer = 0;
          // Phase 3: All members get fear boost when gang retreats
          for (const m of this.members) {
            if (m.alive) m.fear = Math.min(m.maxFear, m.fear + 20);
          }
          if (game && game.announcer) {
            game.announcer.show(`${GANG_COLORS[this.id].name} FALLS BACK`, '', 1200);
          }
        }
        break;
      case GANG_STATES.RETREATING:
        if (this.stateTimer > 3000 && this.morale > 40) {
          // Phase 3: Rally mechanic — gang regroups and comes back
          const leader = this.members.find(m => m.alive && m.traits.leadership > 0.5);
          if (leader && !this.hasRallied) {
            this.state = GANG_STATES.RALLYING;
            this.stateTimer = 0;
            this.hasRallied = true;
            // Leader rallies — reduce all fear
            for (const m of this.members) {
              if (m.alive) {
                m.fear = Math.max(0, m.fear - 30 * leader.traits.leadership);
                m.broken = false;
              }
            }
            if (game && game.announcer) {
              game.announcer.show(`${leader.name} RALLIES`, `${GANG_COLORS[this.id].name} regroups!`, 1800);
            }
          } else if (this.morale > 50) {
            this.state = GANG_STATES.ADVANCING;
            this.stateTimer = 0;
          }
        }
        break;
      case GANG_STATES.RALLYING:
        // Regroup then advance again
        if (this.stateTimer > 2000) {
          this.state = GANG_STATES.ADVANCING;
          this.stateTimer = 0;
          this.morale = Math.min(100, this.morale + 20);
        }
        break;
    }

    // Update individual AI based on gang state
    for (let i = 0; i < this.members.length; i++) {
      const member = this.members[i];
      const ai = this.ais[i];
      if (!member.alive || member.isPlayer) continue;

      this._updateMemberAI(member, ai, dt, allFighters);
    }
  }

  _updateMemberAI(member, ai, dt, allFighters) {
    const f = member;
    if (f.state === STATES.KO || f.isActing || f.hitstopDuration > 0 || f.recoveryCooldown > 0) return;

    // Find nearest enemy (skip KO'd and knocked down)
    let nearestEnemy = null;
    let nearestEnemyDist = Infinity;
    for (const other of allFighters) {
      if (other === f || other.gangId === f.gangId || !other.alive) continue;
      if (other.state === STATES.KNOCKDOWN || other.state === STATES.GETUP) continue;
      const d = dist(f, other);
      if (d < nearestEnemyDist) {
        nearestEnemyDist = d;
        nearestEnemy = other;
      }
    }

    f.target = nearestEnemy;

    switch (this.state) {
      case GANG_STATES.MILLING: {
        // Wander near home
        if (Math.random() < 0.02) {
          const wX = this.homeX + randRange(-40, 40);
          const wY = this.homeY + randRange(-40, 40);
          const ang = Math.atan2(wY - f.y, wX - f.x);
          f.vx = Math.cos(ang) * f.moveSpeed * 0.3;
          f.vy = Math.sin(ang) * f.moveSpeed * 0.3;
          if (f.state !== STATES.WALK) f.setState(STATES.WALK);
        } else if (Math.random() < 0.05) {
          f.vx = 0; f.vy = 0;
          if (f.state !== STATES.IDLE) f.setState(STATES.IDLE);
        }
        break;
      }

      case GANG_STATES.TENSING: {
        // Tighten formation, face rival gang
        const gc = this.center;
        const d = dist(f, gc);
        if (d > 30) {
          const ang = Math.atan2(gc.y - f.y, gc.x - f.x);
          f.vx = Math.cos(ang) * f.moveSpeed * 0.5;
          f.vy = Math.sin(ang) * f.moveSpeed * 0.5;
          if (f.state !== STATES.WALK) f.setState(STATES.WALK);
        } else {
          f.vx = 0; f.vy = 0;
          if (f.state !== STATES.IDLE) f.setState(STATES.IDLE);
        }
        if (nearestEnemy) f.faceTarget();
        break;
      }

      case GANG_STATES.ADVANCING: {
        if (!this.targetGang) break;
        const targetCenter = this.targetGang.center;
        const gangCenter = this.center;

        // Role-based behavior
        let targetX, targetY, speedMult;
        if (f.gangRole === 'vanguard') {
          // Vanguard pushes toward enemy
          targetX = targetCenter.x;
          targetY = targetCenter.y;
          speedMult = 0.6 + f.traits.aggression * 0.4;
        } else if (f.gangRole === 'fighter') {
          // Fighters follow behind vanguard
          targetX = lerp(gangCenter.x, targetCenter.x, 0.5);
          targetY = lerp(gangCenter.y, targetCenter.y, 0.5);
          speedMult = 0.4 + f.traits.aggression * 0.3;
        } else {
          // Followers stay closer to gang center
          targetX = lerp(gangCenter.x, targetCenter.x, 0.2);
          targetY = lerp(gangCenter.y, targetCenter.y, 0.2);
          speedMult = 0.3;
        }

        // Add some spread so they don't stack
        targetX += (Math.sin(f.x * 0.1 + f.y * 0.07) * 20);
        targetY += (Math.cos(f.x * 0.07 + f.y * 0.1) * 15);

        const d = dist(f, { x: targetX, y: targetY });
        if (d > 10) {
          const ang = Math.atan2(targetY - f.y, targetX - f.x);
          f.vx = Math.cos(ang) * f.moveSpeed * speedMult;
          f.vy = Math.sin(ang) * f.moveSpeed * speedMult;
          if (f.state !== STATES.WALK) f.setState(STATES.WALK);
        }

        // Attack if enemy in range
        if (nearestEnemy && nearestEnemyDist < 60) {
          f.faceTarget();
          ai.update(dt, nearestEnemy);
        } else if (nearestEnemy) {
          f.faceTarget();
        }
        break;
      }

      case GANG_STATES.FIGHTING: {
        // Full combat mode - use individual AI
        if (nearestEnemy) {
          ai.update(dt, nearestEnemy);
        }
        break;
      }

      case GANG_STATES.RETREATING: {
        // Move back toward home
        const ang = Math.atan2(this.homeY - f.y, this.homeX - f.x);
        f.vx = Math.cos(ang) * f.moveSpeed * 0.7;
        f.vy = Math.sin(ang) * f.moveSpeed * 0.7;
        if (f.state !== STATES.WALK) f.setState(STATES.WALK);

        // Still fight if cornered
        if (nearestEnemy && nearestEnemyDist < 50) {
          ai.update(dt, nearestEnemy);
        }
        break;
      }

      case GANG_STATES.RALLYING: {
        // Phase 3: Regroup around gang center / leader
        const gc = this.center;
        const d = dist(f, gc);
        if (d > 25) {
          const ang = Math.atan2(gc.y - f.y, gc.x - f.x);
          f.vx = Math.cos(ang) * f.moveSpeed * 0.5;
          f.vy = Math.sin(ang) * f.moveSpeed * 0.5;
          if (f.state !== STATES.WALK) f.setState(STATES.WALK);
        } else {
          f.vx = 0; f.vy = 0;
          if (f.state !== STATES.IDLE) f.setState(STATES.IDLE);
        }
        if (nearestEnemy) f.faceTarget();
        // Defend if attacked
        if (nearestEnemy && nearestEnemyDist < 50) {
          ai.update(dt, nearestEnemy);
        }
        break;
      }
    }

    // Phase 3: Individual fear overrides — broken fighters in any gang state
    if (f.broken && !f.isPlayer && this.state !== GANG_STATES.RETREATING) {
      // Broken member tries to flee back to home even if gang is fighting
      const ang = Math.atan2(this.homeY - f.y, this.homeX - f.x);
      f.vx = Math.cos(ang) * f.moveSpeed * 0.6;
      f.vy = Math.sin(ang) * f.moveSpeed * 0.6;
      if (f.state !== STATES.WALK) f.setState(STATES.WALK);
    }
  }
}

// NAMES
// ============================================================
const FIRST_NAMES = ['Lil','Big','Tiny','Slim','Ghost','Shadow','Demon','Ace','Duke','Rook',
  'Snake','Bull','Spider','Tank','Bones','Reaper','Flaco','Lobo','Diablo','Joker',
  'Puppet','Boxer','Trigger','Casper','Sleepy','Dopey','Chino','Primo','Termite','Droopy',
  'Loco','Huero','Shorty','Syko','Creeper','Stomper','Menace','Smiley','Villain','Wicked'];

function randomName() { return randItem(FIRST_NAMES); }

// ============================================================
// SEEDED PRNG (mulberry32)
// ============================================================
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ============================================================
// PROCEDURAL YARD RENDERER — Phase 2
// ============================================================
class ProceduralYard {
  constructor(worldW, worldH) {
    this.worldW = worldW;
    this.worldH = worldH;
    this.canvas = document.createElement('canvas');
    this.canvas.width = worldW;
    this.canvas.height = worldH;
    this.ctx = this.canvas.getContext('2d');
    this.overlayCanvas = document.createElement('canvas');
    this.overlayCanvas.width = worldW;
    this.overlayCanvas.height = worldH;
    this.overlayCtx = this.overlayCanvas.getContext('2d');
    this._generate();
    this._generateOverlay();
  }

  _generate() {
    const c = this.ctx;
    const w = this.worldW;
    const h = this.worldH;
    const rng = mulberry32(42);

    // === Layer 1: Base concrete with subtle variation ===
    const baseR = 122, baseG = 117, baseB = 108;
    const blockSize = 6;
    for (let bx = 0; bx < w; bx += blockSize) {
      for (let by = 0; by < h; by += blockSize) {
        const noise = (rng() - 0.5) * 14;
        const r = clamp(baseR + noise + (rng() - 0.5) * 6, 0, 255);
        const g = clamp(baseG + noise + (rng() - 0.5) * 4, 0, 255);
        const b = clamp(baseB + noise + (rng() - 0.5) * 4, 0, 255);
        c.fillStyle = `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
        c.fillRect(bx, by, blockSize, blockSize);
      }
    }

    // === Layer 2: Concrete slab seams ===
    c.strokeStyle = 'rgba(0,0,0,0.07)';
    c.lineWidth = 1;
    // Horizontal seams
    for (let y = 0; y < h; y += 80 + Math.floor(rng() * 40)) {
      const jitter = (rng() - 0.5) * 2;
      c.beginPath();
      c.moveTo(0, y + jitter);
      c.lineTo(w, y + jitter + (rng() - 0.5) * 3);
      c.stroke();
    }
    // Vertical seams
    for (let x = 0; x < w; x += 90 + Math.floor(rng() * 50)) {
      const jitter = (rng() - 0.5) * 2;
      c.beginPath();
      c.moveTo(x + jitter, 0);
      c.lineTo(x + jitter + (rng() - 0.5) * 3, h);
      c.stroke();
    }

    // Slightly different slab tones in some sections
    for (let i = 0; i < 8; i++) {
      const sx = rng() * w;
      const sy = rng() * h;
      const sw = 60 + rng() * 120;
      const sh = 50 + rng() * 100;
      c.fillStyle = rng() > 0.5 ? 'rgba(0,0,0,0.015)' : 'rgba(255,255,255,0.012)';
      c.fillRect(sx, sy, sw, sh);
    }

    // === Layer 3: Cracks ===
    for (let i = 0; i < 20; i++) {
      let cx = rng() * w;
      let cy = rng() * h;
      const len = 15 + rng() * 60;
      let ang = rng() * Math.PI * 2;
      c.strokeStyle = `rgba(0,0,0,${0.08 + rng() * 0.1})`;
      c.lineWidth = 0.5 + rng() * 1;
      c.beginPath();
      c.moveTo(cx, cy);
      for (let s = 0; s < len; s += 3) {
        ang += (rng() - 0.5) * 0.8;
        cx += Math.cos(ang) * 3;
        cy += Math.sin(ang) * 3;
        c.lineTo(cx, cy);
      }
      c.stroke();
      // Thin highlight next to crack (light catching edge)
      c.strokeStyle = 'rgba(255,255,255,0.03)';
      c.lineWidth = 0.5;
      c.beginPath();
      c.moveTo(cx + 1, cy + 1);
      c.lineTo(cx - Math.cos(ang) * 5, cy - Math.sin(ang) * 5);
      c.stroke();
    }

    // === Layer 4: Stains and weathering ===
    // Dark stains (oil, dirt)
    for (let i = 0; i < 12; i++) {
      const sx = rng() * w;
      const sy = rng() * h;
      const radius = 10 + rng() * 30;
      const grad = c.createRadialGradient(sx, sy, 0, sx, sy, radius);
      const alpha = 0.03 + rng() * 0.05;
      grad.addColorStop(0, `rgba(40,30,20,${alpha})`);
      grad.addColorStop(1, 'rgba(40,30,20,0)');
      c.fillStyle = grad;
      c.fillRect(sx - radius, sy - radius, radius * 2, radius * 2);
    }
    // Water marks (lighter)
    for (let i = 0; i < 6; i++) {
      const sx = rng() * w;
      const sy = rng() * h;
      const radius = 8 + rng() * 20;
      const grad = c.createRadialGradient(sx, sy, 0, sx, sy, radius);
      grad.addColorStop(0, `rgba(160,155,145,0.04)`);
      grad.addColorStop(1, 'rgba(160,155,145,0)');
      c.fillStyle = grad;
      c.fillRect(sx - radius, sy - radius, radius * 2, radius * 2);
    }

    // === Layer 5: Faded basketball court lines ===
    const courtCX = w * 0.5;
    const courtCY = h * 0.5;
    const courtW = Math.min(w * 0.6, 500);
    const courtH = Math.min(h * 0.7, 400);

    c.strokeStyle = 'rgba(255,255,255,0.045)';
    c.lineWidth = 2;

    // Court rectangle
    c.strokeRect(courtCX - courtW / 2, courtCY - courtH / 2, courtW, courtH);

    // Center line
    c.beginPath();
    c.moveTo(courtCX - courtW / 2, courtCY);
    c.lineTo(courtCX + courtW / 2, courtCY);
    c.stroke();

    // Center circle
    c.beginPath();
    c.arc(courtCX, courtCY, 40, 0, Math.PI * 2);
    c.stroke();

    // Free throw areas (top and bottom)
    const ftW = 80;
    const ftH = courtH * 0.25;
    c.strokeRect(courtCX - ftW / 2, courtCY - courtH / 2, ftW, ftH);
    c.strokeRect(courtCX - ftW / 2, courtCY + courtH / 2 - ftH, ftW, ftH);

    // Free throw circles
    c.beginPath();
    c.arc(courtCX, courtCY - courtH / 2 + ftH, 25, 0, Math.PI * 2);
    c.stroke();
    c.beginPath();
    c.arc(courtCX, courtCY + courtH / 2 - ftH, 25, 0, Math.PI * 2);
    c.stroke();

    // Three point arcs
    c.setLineDash([4, 6]);
    c.strokeStyle = 'rgba(255,255,255,0.03)';
    c.beginPath();
    c.arc(courtCX, courtCY - courtH / 2, courtW * 0.35, 0.3, Math.PI - 0.3);
    c.stroke();
    c.beginPath();
    c.arc(courtCX, courtCY + courtH / 2, courtW * 0.35, Math.PI + 0.3, -0.3);
    c.stroke();
    c.setLineDash([]);

    // === Layer 6: Drain grates ===
    for (let i = 0; i < 3; i++) {
      const gx = 60 + rng() * (w - 120);
      const gy = 40 + rng() * (h - 80);
      const gw = 16;
      const gh = 16;
      c.fillStyle = '#3a3530';
      c.fillRect(gx, gy, gw, gh);
      c.strokeStyle = '#2a2520';
      c.lineWidth = 1;
      c.strokeRect(gx, gy, gw, gh);
      // Cross-hatch
      c.strokeStyle = '#4a4540';
      c.lineWidth = 0.5;
      for (let s = 0; s < gw; s += 4) {
        c.beginPath();
        c.moveTo(gx + s, gy);
        c.lineTo(gx + s, gy + gh);
        c.stroke();
      }
      for (let s = 0; s < gh; s += 4) {
        c.beginPath();
        c.moveTo(gx, gy + s);
        c.lineTo(gx + gw, gy + s);
        c.stroke();
      }
    }

    // === Layer 7: Bench shadows along south wall ===
    for (let i = 0; i < 2; i++) {
      const bx = w * 0.2 + i * w * 0.45;
      const by = h - 35;
      // Bench body
      c.fillStyle = '#5a5045';
      c.fillRect(bx, by, 50, 8);
      c.fillRect(bx + 2, by + 8, 4, 6);
      c.fillRect(bx + 44, by + 8, 4, 6);
      // Shadow
      c.fillStyle = 'rgba(0,0,0,0.06)';
      c.fillRect(bx + 3, by + 14, 48, 6);
    }

    // === Layer 8: Fence posts (ground level) — drawn on base ===
    const fenceInset = 6;
    const postSpacing = 60;
    c.fillStyle = '#4a4540';
    // Top and bottom posts
    for (let x = 0; x < w; x += postSpacing) {
      c.fillRect(x, 0, 6, fenceInset + 4);
      c.fillRect(x, h - fenceInset - 4, 6, fenceInset + 4);
    }
    // Left and right posts
    for (let y = 0; y < h; y += postSpacing) {
      c.fillRect(0, y, fenceInset + 4, 6);
      c.fillRect(w - fenceInset - 4, y, fenceInset + 4, 6);
    }

    // === Layer 9: Guard tower shadow ===
    c.fillStyle = 'rgba(0,0,0,0.035)';
    // Diagonal shadow from top-left corner
    c.beginPath();
    c.moveTo(0, 0);
    c.lineTo(120, 0);
    c.lineTo(200, 140);
    c.lineTo(80, 140);
    c.closePath();
    c.fill();
  }

  _generateOverlay() {
    // Fence overlay that draws ON TOP of fighters (razor wire, chain link upper)
    const c = this.overlayCtx;
    const w = this.worldW;
    const h = this.worldH;
    const fenceH = 14;

    // Chain-link diamond mesh pattern around perimeter
    c.strokeStyle = 'rgba(90,85,75,0.5)';
    c.lineWidth = 0.5;
    const meshSize = 6;
    // Top fence
    for (let x = 0; x < w; x += meshSize) {
      for (let row = 0; row < 2; row++) {
        const y = row * meshSize;
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y);
        c.stroke();
        c.beginPath();
        c.moveTo(x, y + meshSize);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y + meshSize);
        c.stroke();
      }
    }
    // Bottom fence
    for (let x = 0; x < w; x += meshSize) {
      for (let row = 0; row < 2; row++) {
        const y = h - fenceH + row * meshSize;
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y);
        c.stroke();
        c.beginPath();
        c.moveTo(x, y + meshSize);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y + meshSize);
        c.stroke();
      }
    }
    // Left fence
    for (let y = 0; y < h; y += meshSize) {
      for (let col = 0; col < 2; col++) {
        const x = col * meshSize;
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x, y + meshSize);
        c.stroke();
        c.beginPath();
        c.moveTo(x + meshSize, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y + meshSize);
        c.stroke();
      }
    }
    // Right fence
    for (let y = 0; y < h; y += meshSize) {
      for (let col = 0; col < 2; col++) {
        const x = w - fenceH + col * meshSize;
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x, y + meshSize);
        c.stroke();
        c.beginPath();
        c.moveTo(x + meshSize, y);
        c.lineTo(x + meshSize / 2, y + meshSize / 2);
        c.lineTo(x + meshSize, y + meshSize);
        c.stroke();
      }
    }

    // Razor wire — coiled zigzag along all edges
    c.strokeStyle = 'rgba(140,140,130,0.6)';
    c.lineWidth = 1;
    const rzH = 5;
    // Top razor wire
    c.beginPath();
    for (let x = 0; x < w; x += 6) {
      c.lineTo(x, (x / 6 % 2 === 0) ? 1 : rzH);
    }
    c.stroke();
    // Bottom razor wire
    c.beginPath();
    for (let x = 0; x < w; x += 6) {
      c.lineTo(x, h - ((x / 6 % 2 === 0) ? 1 : rzH));
    }
    c.stroke();
    // Left razor wire
    c.beginPath();
    for (let y = 0; y < h; y += 6) {
      c.lineTo((y / 6 % 2 === 0) ? 1 : rzH, y);
    }
    c.stroke();
    // Right razor wire
    c.beginPath();
    for (let y = 0; y < h; y += 6) {
      c.lineTo(w - ((y / 6 % 2 === 0) ? 1 : rzH), y);
    }
    c.stroke();

    // Razor wire glints (small bright dots)
    c.fillStyle = 'rgba(200,200,190,0.5)';
    for (let x = 0; x < w; x += 18) {
      c.fillRect(x, 2, 1, 1);
      c.fillRect(x + 3, h - 3, 1, 1);
    }
    for (let y = 0; y < h; y += 18) {
      c.fillRect(2, y, 1, 1);
      c.fillRect(w - 3, y + 3, 1, 1);
    }
  }

  draw(ctx) {
    ctx.drawImage(this.canvas, 0, 0);
  }

  drawOverlay(ctx) {
    ctx.drawImage(this.overlayCanvas, 0, 0);
  }
}
