<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YARD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    cursor: default;
    user-select: none;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #menu-screen {
    pointer-events: all;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px 60px;
    background: rgba(10, 10, 10, 0.95);
    border: 2px solid #3a2a1a;
    position: relative;
  }
  #menu-screen::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid #2a1a0a;
    pointer-events: none;
  }
  #menu-screen h1 {
    font-size: 48px;
    color: #c4843a;
    text-shadow: 3px 3px 0 #1a0a00, -1px -1px 0 #5a3a1a;
    letter-spacing: 12px;
    margin-bottom: 8px;
  }
  #menu-screen .subtitle {
    font-size: 8px;
    color: #6a5a4a;
    letter-spacing: 4px;
    margin-bottom: 24px;
  }
  .menu-btn {
    pointer-events: all;
    background: #1a1208;
    border: 1px solid #3a2a1a;
    color: #c4943a;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 14px 32px;
    cursor: pointer;
    width: 260px;
    text-align: center;
    transition: all 0.1s;
    letter-spacing: 1px;
  }
  .menu-btn:hover {
    background: #2a1a0a;
    border-color: #c4943a;
    color: #ffd080;
    transform: scale(1.02);
  }
  .menu-btn:active { transform: scale(0.98); }
  .menu-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .menu-section-title {
    font-size: 7px;
    color: #5a4a3a;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }
  .gang-select {
    display: flex;
    gap: 8px;
    pointer-events: all;
  }
  .gang-btn {
    pointer-events: all;
    width: 48px;
    height: 48px;
    border: 2px solid #333;
    background: #111;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: all 0.1s;
    position: relative;
  }
  .gang-btn.selected { border-color: #ffd080; box-shadow: 0 0 8px rgba(255,208,128,0.3); }
  .gang-btn:hover { border-color: #888; }
  .gang-btn .gang-color {
    width: 20px;
    height: 20px;
    border: 1px solid #555;
  }
  .gang-btn .gang-label {
    font-size: 5px;
    color: #888;
    margin-top: 3px;
    font-family: 'Press Start 2P', monospace;
  }
  .controls-info {
    font-size: 6px;
    color: #4a3a2a;
    line-height: 1.8;
    text-align: center;
    margin-top: 16px;
    letter-spacing: 1px;
  }
  .controls-info span { color: #8a7a5a; }
  .trait-row {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 130px;
    pointer-events: all;
  }
  .trait-label {
    font-size: 6px;
    color: #8a7a5a;
    font-family: 'Press Start 2P', monospace;
    width: 28px;
  }
  .trait-val {
    font-size: 6px;
    color: #c4943a;
    font-family: 'Press Start 2P', monospace;
    width: 14px;
    text-align: right;
  }
  .trait-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 6px;
    background: #1a1208;
    border: 1px solid #3a2a1a;
    outline: none;
    cursor: pointer;
  }
  .trait-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 8px;
    height: 12px;
    background: #c4943a;
    border: none;
    cursor: pointer;
  }
  .trait-slider::-moz-range-thumb {
    width: 8px;
    height: 12px;
    background: #c4943a;
    border: none;
    cursor: pointer;
  }
  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: none;
  }
  #pause-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    pointer-events: all;
    z-index: 100;
  }
  #pause-overlay .pause-text {
    font-size: 24px;
    color: #c4943a;
    letter-spacing: 6px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="menu-screen">
    <h1>YARD</h1>
    <div class="subtitle">CALIFORNIA STATE PENITENTIARY</div>
    <div class="menu-section">
      <div class="menu-section-title">SELECT YOUR SET</div>
      <div class="gang-select" id="gang-select">
        <div class="gang-btn selected" data-gang="surenos" onclick="selectGang(this)">
          <div class="gang-color" style="background:#2a4a9a"></div>
          <div class="gang-label">SUR 13</div>
        </div>
        <div class="gang-btn" data-gang="woods" onclick="selectGang(this)">
          <div class="gang-color" style="background:#8a8a7a"></div>
          <div class="gang-label">WOODS</div>
        </div>
        <div class="gang-btn" data-gang="bgf" onclick="selectGang(this)">
          <div class="gang-color" style="background:#2a6a3a"></div>
          <div class="gang-label">RIDERS</div>
        </div>
        <div class="gang-btn" data-gang="nortenos" onclick="selectGang(this)">
          <div class="gang-color" style="background:#9a2a2a"></div>
          <div class="gang-label">XIV</div>
        </div>
      </div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">GAME MODE</div>
      <button class="menu-btn" onclick="startGame('1v1')">1 V 1 &nbsp; FIGHT</button>
      <button class="menu-btn" onclick="startGame('cell')">CELL &nbsp; FIGHT</button>
      <button class="menu-btn" onclick="startGame('riot')">YARD &nbsp; RIOT</button>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">BUILD YOUR FIGHTER</div>
      <div id="trait-builder" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:280px;">
        <div class="trait-row" data-trait="aggression">
          <span class="trait-label">AGG</span>
          <input type="range" min="1" max="10" value="7" class="trait-slider" oninput="updateTraits()">
          <span class="trait-val">7</span>
        </div>
        <div class="trait-row" data-trait="toughness">
          <span class="trait-label">TGH</span>
          <input type="range" min="1" max="10" value="7" class="trait-slider" oninput="updateTraits()">
          <span class="trait-val">7</span>
        </div>
        <div class="trait-row" data-trait="speed">
          <span class="trait-label">SPD</span>
          <input type="range" min="1" max="10" value="7" class="trait-slider" oninput="updateTraits()">
          <span class="trait-val">7</span>
        </div>
        <div class="trait-row" data-trait="power">
          <span class="trait-label">PWR</span>
          <input type="range" min="1" max="10" value="7" class="trait-slider" oninput="updateTraits()">
          <span class="trait-val">7</span>
        </div>
      </div>
      <div id="trait-points" style="font-size:6px;color:#8a7a5a;letter-spacing:1px;">POINTS: 28 / 28</div>
      <div id="trait-archetype" style="font-size:5px;color:#5a4a3a;letter-spacing:1px;">STYLE: BALANCED</div>
    </div>
    <div class="controls-info">
      <span>WASD</span> MOVE &nbsp;&middot;&nbsp; <span>J</span> JAB &nbsp;&middot;&nbsp; <span>K</span> HOOK &nbsp;&middot;&nbsp; <span>H/SPACE</span> SHOVE<br>
      <span>L</span> BLOCK &nbsp;&middot;&nbsp; <span>S</span> SLIP &nbsp;&middot;&nbsp; <span>ESC</span> PAUSE &nbsp;&middot;&nbsp; <span>R</span> RESTART &nbsp;&middot;&nbsp; <span>Q</span> MENU
    </div>
  </div>
</div>

<div id="hud"></div>

<div id="pause-overlay">
  <div class="pause-text">PAUSED</div>
  <button class="menu-btn" onclick="resumeGame()">RESUME</button>
  <button class="menu-btn" onclick="quitToMenu()">QUIT</button>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const FRAME_W = 16;
const FRAME_H = 16;
const SCALE = 4;
const DISPLAY_SIZE = FRAME_W * SCALE; // 64px on screen
const CANVAS_W = 960;
const CANVAS_H = 540;

// Combat tuning
const JAB_DAMAGE = 12;
const HOOK_DAMAGE = 22;
const JAB_KNOCKBACK = 5;
const HOOK_KNOCKBACK = 10;
const BLOCK_DAMAGE_MULT = 0.2;
const BLOCK_KNOCKBACK_MULT = 0.1;
const MAX_HEALTH = 100;
const KO_DURATION = 3000;

// Hitstop (time-based, ms) — Phase 1A
const JAB_HITSTOP = 70;
const HOOK_HITSTOP = 200;
const KO_HITSTOP = 450;
const HITSTOP_ATTACKER_MULT = 0.45; // attacker barely freezes — keeps you in control

// Knockback curves — Phase 1B
const KNOCKBACK_DURATION_JAB = 180;
const KNOCKBACK_DURATION_HOOK = 320;
const KB_FRICTION_START = 0.985;   // low friction initially (body flies)
const KB_FRICTION_END = 0.88;     // heavy braking at end
const HOOK_VERTICAL_BOUNCE = -3.5; // upward pop on hooks
const BOUNCE_GRAVITY = 0.18;       // gravity for vertical bounce

// Recovery cooldowns — Phase 1C
const JAB_RECOVERY_MS = 100;
const HOOK_RECOVERY_MS = 250;
const INPUT_BUFFER_WINDOW = 150; // ms to hold buffered attack input

// Data-driven attack definitions
const MOVE_DEFS = {
  jab: {
    startup: 70, active: 45, recovery: 50,   // snappy — jab should feel instant
    damage: 12, staminaCost: 10, knockback: 5,
    guardDamage: 6, guardStun: 80, fearDamage: 4,
    pushback: 3, moveSpeedMult: 0.55,
    hitstop: 50, blockPushback: 4
  },
  hook: {
    startup: 135, active: 55, recovery: 250,  // same as original
    damage: 22, staminaCost: 22, knockback: 10,
    guardDamage: 18, guardStun: 180, fearDamage: 12,
    pushback: 8, moveSpeedMult: 0.35,
    hitstop: 200, blockPushback: 8
  },
  shove: {
    startup: 90, active: 40, recovery: 200,
    damage: 4, staminaCost: 14, knockback: 14,
    guardDamage: 22, guardStun: 250, fearDamage: 18,
    pushback: 18, moveSpeedMult: 0.45,
    hitstop: 100, blockPushback: 14
  }
};

// Stamina — Phase 2
const MAX_STAMINA = 100;
const STAMINA_REGEN_RATE = 18;      // per second idle/walking
const JAB_STAMINA_COST = 10;
const HOOK_STAMINA_COST = 22;
const BLOCK_STAMINA_DRAIN = 6;      // per second while blocking
const LOW_STAMINA_THRESHOLD = 20;
const LOW_STAMINA_SPEED_MULT = 0.65;
const LOW_STAMINA_DAMAGE_MULT = 0.6;

// Knockdown system — Batch 1 (reworked Batch 3)
const KNOCKDOWN_THRESHOLD = 0.25;   // health % that triggers knockdown chance
const KNOCKDOWN_HOOK_CHANCE = 0.35; // chance hook causes knockdown (scales with damage)
const KNOCKDOWN_DURATION = 1500;     // ms on the ground
const GETUP_WINDOW = 1200;          // ms player has to mash to get up
const GETUP_TAPS_NEEDED = 4;        // taps needed to get up (increases per knockdown)
const MAX_KNOCKDOWNS = 3;           // 3 knockdowns = TKO
const KNOCKDOWN_HEALTH_RECOVERY = 0.05; // recover 5% max health on get-up (fighting spirit)
// Knockdown rework — instant KO + wobble
const INSTANT_KO_BASE_CHANCE = 0.15;   // base chance of instant KO when health<=0
const INSTANT_KO_HOOK_BONUS = 0.25;    // extra chance for hooks
const INSTANT_KO_OVERKILL_SCALE = 0.4; // scales with overkill damage
const WOBBLE_DURATION = 1800;          // ms of post-knockdown wobble
const WOBBLE_SPEED_MULT = 0.45;        // speed during wobble

// Clinch system — Batch 1
const CLINCH_DISTANCE = 30;         // how close to enter clinch
const CLINCH_TIME_NEEDED = 400;     // ms of close proximity to trigger clinch
const CLINCH_GUT_SHOT_DAMAGE = 6;   // low damage gut shots
const CLINCH_GUT_SHOT_INJURY = 8;   // but builds injury fast
const CLINCH_SHOVE_FORCE = 12;      // knockback from shove
const CLINCH_SHOVE_STAMINA = 15;    // stamina cost to shove
const CLINCH_BREAK_STAMINA = 8;     // stamina cost to break away
const CLINCH_DURATION_MAX = 3000;   // auto-break after this long

// Blood trail — Batch 2
const BLOOD_TRAIL_INJURY_THRESHOLD = 30;  // injuries% before blood trails start
const BLOOD_TRAIL_INTERVAL = 350;         // ms between drips while moving
const BLOOD_TRAIL_HEAVY_INTERVAL = 150;   // ms when badly hurt (injuries > 60)

// Stagger system — Batch 2
const STAGGER_HIT_WINDOW = 1200;    // ms window for counting rapid hits
const STAGGER_HIT_THRESHOLD = 3;    // hits in window to trigger stagger
const STAGGER_DURATION = 600;       // ms of stagger (vulnerability + slow)
const STAGGER_SPEED_MULT = 0.3;     // movement speed while staggered

// Guard alarm — Batch 2 (riot mode only)
const GUARD_ALARM_MIN = 60000;      // min ms before guards intervene (60s)
const GUARD_ALARM_MAX = 90000;      // max ms (90s)
const GUARD_WARNING_TIME = 10000;   // 10s warning whistle before recall

// Batch 4: Fight Feel — Footwork (refined Batch 5)
const LUNGE_FORCE_JAB = 3.5;          // forward burst on jab startup
const LUNGE_FORCE_HOOK = 5;           // forward burst on hook startup
const LUNGE_MIN_DIST = 30;            // no lunge if closer than this
const LUNGE_MAX_DIST = 65;            // full lunge at this distance and beyond
const WHIFF_BACKSTEP = 2;             // backward drift when attack misses
const CORNER_PRESSURE_DIST = 60;      // px from wall edge to count as cornered
const CORNER_PRESSURE_FEAR_MULT = 1.5; // fear damage multiplier when cornered
const CORNER_PRESSURE_DMG_MULT = 1.12; // damage multiplier when cornered

// Batch 4: Fight Feel — Momentum (Heat)
const HEAT_GAIN_PER_HIT = 18;         // heat gained per landed hit
const HEAT_GAIN_HOOK = 30;            // heat from landing a hook
const HEAT_MAX = 100;
const HEAT_DECAY_RATE = 8;            // per second when not hitting
const HEAT_DECAY_DELAY = 1200;        // ms after last hit before decay starts
const HEAT_SPEED_BONUS = 0.12;        // +12% speed at max heat
const HEAT_DAMAGE_BONUS = 0.18;       // +18% damage at max heat
const HEAT_FEAR_BONUS = 0.3;          // +30% fear damage at max heat
const HEAT_RESET_ON_HIT = 0.6;       // lose 60% heat when you get hit

// Batch 4: Fight Feel — Slip/Duck
const SLIP_DURATION = 280;            // ms of the slip animation
const SLIP_COOLDOWN = 400;            // ms before you can slip again
const SLIP_COUNTER_WINDOW = 200;      // ms after slip where attacks do bonus damage
const SLIP_COUNTER_DAMAGE_MULT = 1.4; // 40% bonus damage on counter
const SLIP_SPEED_MULT = 0.2;          // movement speed while slipping

// Batch 5: Juice & Polish
const HIT_CONFIRM_DURATION = 120;     // ms of white outline flash on landing a hit
const COMBO_DISPLAY_DURATION = 1200;  // ms to show combo counter
const DANGER_HEALTH_THRESHOLD = 0.25; // health % to trigger danger state
const DANGER_PULSE_SPEED = 0.004;     // pulse frequency for danger vignette
const BLOOD_STAIN_CHANCE = 0.35;      // chance a blood particle leaves a permanent mark
const BLOOD_STAIN_MAX = 60;           // max persistent blood stains
const IMPACT_DUST_COUNT = 3;          // dust particles on knockback
const FAILED_INPUT_FLASH = 80;        // ms of red flash when attack input fails

// Animation frame durations (ms)
const ANIM_WALK_SPD = 140;
const ANIM_JAB_SPD = 35;             // fast jab — should snap out
const ANIM_HOOK_SPD = 65;
const ANIM_HIT_SPD = 70;
const ANIM_BLOCK_SPD = 60;
const ANIM_IDLE_SPD = 400;

// Hitbox - when in active frames, reach in front of character
const PUNCH_REACH = 38;
const PUNCH_WIDTH = 28;
const PUNCH_HEIGHT = 36;

// Gang colors
const GANG_COLORS = {
  surenos:  { primary: '#2a4a9a', light: '#4a7adf', dark: '#1a2a5a', name: 'Surenos' },
  woods:    { primary: '#7a7a6a', light: '#aaaaaa', dark: '#4a4a3a', name: 'Wood Pile' },
  bgf:      { primary: '#2a6a3a', light: '#4aaa5a', dark: '#1a3a1a', name: 'Riders' },
  nortenos: { primary: '#9a2a2a', light: '#da4a4a', dark: '#5a1a1a', name: 'Nortenos' }
};

// Yard dimensions
const YARD_1V1_W = 800;
const YARD_1V1_H = 500;
const YARD_RIOT_W = 1100;
const YARD_RIOT_H = 700;
const YARD_CELL_W = 280;
const YARD_CELL_H = 200;

const SFX = {
  ctx: null,
  masterGain: null,
  initialized: false,
  muted: false,

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.6;
      this.masterGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch (e) {
      console.warn('Web Audio not available:', e);
    }
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },

  // --- IMPACT SOUNDS ---

  // Fleshy punch thud — clean hit
  punchHit(intensity = 1) {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // Low thud (body impact)
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80 + intensity * 30, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
    gain.gain.setValueAtTime(0.35 * intensity, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.15);

    // Noise burst (slap/crack)
    const bufLen = ctx.sampleRate * 0.06;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 3);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.25 * intensity, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800 + intensity * 600;
    filter.Q.value = 1.5;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.06);
  },

  // Heavy hook impact — meatier
  hookHit(intensity = 1) {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // Deep body thud
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(60, now);
    osc.frequency.exponentialRampToValueAtTime(25, now + 0.2);
    gain.gain.setValueAtTime(0.45 * intensity, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.22);

    // Harder crack
    const bufLen = ctx.sampleRate * 0.08;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 2.5);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.35 * intensity, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 600;
    filter.Q.value = 1;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.08);

    // Sub thump for weight
    const sub = ctx.createOscillator();
    const subGain = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.value = 35;
    subGain.gain.setValueAtTime(0.3 * intensity, now);
    subGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    sub.connect(subGain);
    subGain.connect(this.masterGain);
    sub.start(now);
    sub.stop(now + 0.15);
  },

  // Block/guard impact — dull thump
  blockHit() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.1);

    // Muffled noise
    const bufLen = ctx.sampleRate * 0.04;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 4);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.12, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.04);
  },

  // Whiff — air swoosh
  whiff() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    const bufLen = ctx.sampleRate * 0.12;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      data[i] = (Math.random() * 2 - 1) * Math.sin(t * Math.PI) * 0.5;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.linearRampToValueAtTime(800, now + 0.12);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.12);
  },

  // Body hitting concrete — knockdown
  knockdown() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // Heavy thud
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(50, now);
    osc.frequency.exponentialRampToValueAtTime(20, now + 0.3);
    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.3);

    // Concrete scrape
    const bufLen = ctx.sampleRate * 0.15;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      data[i] = (Math.random() * 2 - 1) * (1 - t) * 0.4;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.18, now + 0.03);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 300;
    filter.Q.value = 0.8;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(this.masterGain);
    noise.start(now + 0.03);
    noise.stop(now + 0.18);
  },

  // KO hit — devastating final blow
  koHit() {
    if (!this.initialized || this.muted) return;
    this.hookHit(1.5);
    // Extra reverb-like tail
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(40, now + 0.05);
    osc.frequency.exponentialRampToValueAtTime(15, now + 0.5);
    gain.gain.setValueAtTime(0.3, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now + 0.05);
    osc.stop(now + 0.5);
  },

  // Shove impact
  shove() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // Cloth/push sound
    const bufLen = ctx.sampleRate * 0.1;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      data[i] = (Math.random() * 2 - 1) * (1 - t * t);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 500;
    filter.Q.value = 0.7;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.1);

    // Thump
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, now);
    osc.frequency.exponentialRampToValueAtTime(45, now + 0.1);
    oscGain.gain.setValueAtTime(0.25, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(oscGain);
    oscGain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.1);
  },

  // --- AMBIENT ---

  // Yard ambiance — continuous low drone + distant murmur
  _ambienceNode: null,
  _ambienceGain: null,

  startAmbience(mode) {
    if (!this.initialized || this.muted) return;
    this.stopAmbience();
    const ctx = this.ctx;

    this._ambienceGain = ctx.createGain();
    this._ambienceGain.gain.value = mode === 'riot' ? 0.06 : 0.03;
    this._ambienceGain.connect(this.masterGain);

    // Looping noise buffer for crowd murmur
    const secs = 2;
    const bufLen = ctx.sampleRate * secs;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    // Brown noise (integrated white noise) — sounds like distant crowd
    let last = 0;
    for (let i = 0; i < bufLen; i++) {
      const white = Math.random() * 2 - 1;
      last = (last + (0.02 * white)) / 1.02;
      data[i] = last * 3.5;
    }
    this._ambienceNode = ctx.createBufferSource();
    this._ambienceNode.buffer = buf;
    this._ambienceNode.loop = true;

    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = mode === 'riot' ? 350 : 200;
    filter.Q.value = 0.5;

    this._ambienceNode.connect(filter);
    filter.connect(this._ambienceGain);
    this._ambienceNode.start();
  },

  stopAmbience() {
    if (this._ambienceNode) {
      try { this._ambienceNode.stop(); } catch(e) {}
      this._ambienceNode = null;
    }
    if (this._ambienceGain) {
      this._ambienceGain.disconnect();
      this._ambienceGain = null;
    }
  },

  // Crowd roar — burst on KO or big moment
  crowdRoar(intensity = 1) {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    const secs = 0.8;
    const bufLen = ctx.sampleRate * secs;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      const white = Math.random() * 2 - 1;
      last = (last + (0.02 * white)) / 1.02;
      // Swell up then fade
      const envelope = Math.sin(t * Math.PI) * (1 - t * 0.3);
      data[i] = last * 3.5 * envelope;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12 * intensity, now);
    gain.gain.linearRampToValueAtTime(0.001, now + secs);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 400;
    filter.Q.value = 0.4;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + secs);
  },

  // Guard whistle — sharp high pitch
  whistle() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    for (let i = 0; i < 3; i++) {
      const t = now + i * 0.25;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2800, t);
      osc.frequency.linearRampToValueAtTime(2400, t + 0.15);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t);
      osc.stop(t + 0.18);
    }
  },

  // Bell/gong — fight start
  bell() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // Metallic ring
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.value = 800;
    osc2.type = 'sine';
    osc2.frequency.value = 1200;
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(this.masterGain);
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.8);
    osc2.stop(now + 0.8);
  },

  // Slip/dodge swoosh — quick air
  slip() {
    if (!this.initialized || this.muted) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    const bufLen = ctx.sampleRate * 0.08;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      data[i] = (Math.random() * 2 - 1) * Math.sin(t * Math.PI) * 0.3;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 3000;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    noise.start(now);
    noise.stop(now + 0.08);
  }
};

function updateTraits() {
  const rows = document.querySelectorAll('.trait-row');
  let total = 0;
  const vals = {};
  rows.forEach(row => {
    const slider = row.querySelector('.trait-slider');
    const valEl = row.querySelector('.trait-val');
    const trait = row.dataset.trait;
    const v = parseInt(slider.value);
    valEl.textContent = v;
    vals[trait] = v;
    total += v;
  });

  // Enforce point cap — if over, reduce last changed
  const pointsEl = document.getElementById('trait-points');
  if (total > MAX_TRAIT_POINTS) {
    pointsEl.style.color = '#cc4422';
    // Clamp the overflow by reducing this slider
    const diff = total - MAX_TRAIT_POINTS;
    const lastRow = event.target.closest('.trait-row');
    const lastSlider = lastRow.querySelector('.trait-slider');
    lastSlider.value = parseInt(lastSlider.value) - diff;
    const lastVal = lastRow.querySelector('.trait-val');
    lastVal.textContent = lastSlider.value;
    vals[lastRow.dataset.trait] = parseInt(lastSlider.value);
    total = MAX_TRAIT_POINTS;
  }
  pointsEl.textContent = `POINTS: ${total} / ${MAX_TRAIT_POINTS}`;
  pointsEl.style.color = total === MAX_TRAIT_POINTS ? '#6a8a4a' : '#8a7a5a';

  // Store normalized traits (0-1)
  playerTraits = {
    aggression: vals.aggression / 10,
    toughness: vals.toughness / 10,
    speed: vals.speed / 10,
    power: vals.power / 10,
  };

  // Show archetype preview
  const archEl = document.getElementById('trait-archetype');
  const a = playerTraits.aggression, t = playerTraits.toughness;
  const s = playerTraits.speed, p = playerTraits.power;
  let style = 'BALANCED';
  if (a > 0.7 && p > 0.6) style = 'BRAWLER';
  else if (a < 0.4 && s > 0.6) style = 'COUNTERPUNCHER';
  else if (a > 0.6 && t > 0.7) style = 'BULLY';
  else if (t < 0.4 && a < 0.5) style = 'COWARD';
  else if (s > 0.7 && a > 0.5) style = 'SWARMER';
  else if (p > 0.7 && s < 0.5) style = 'SLUGGER';
  archEl.textContent = `STYLE: ${style}`;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function randRange(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(randRange(min, max + 1)); }
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

function loadAssets() {
  const promises = [];
  for (const [key, path] of Object.entries(ASSET_LIST)) {
    promises.push(new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => { assets[key] = img; resolve(); };
      img.onerror = () => { console.warn('Failed to load:', path); assets[key] = null; resolve(); };
      img.src = path;
    }));
  }
  return Promise.all(promises);
}

const input = {

    window.addEventListener('keydown', e => {

class Particle {
  constructor(x, y, vx, vy, color, size, life, gravity = 0, friction = 0.98) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.maxLife = life;
    this.life = life;
    this.gravity = gravity;
    this.friction = friction;
    this.alive = true;
  }
  update(dt) {
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    this.vy += this.gravity * dt / 16;
    this.vx *= this.friction;
    this.vy *= this.friction;
    this.x += this.vx * dt / 16;
    this.y += this.vy * dt / 16;
  }
  draw(ctx, cam) {
    const alpha = clamp(this.life / this.maxLife, 0, 1);
    const sx = (this.x - cam.x) * cam.zoom;
    const sy = (this.y - cam.y) * cam.zoom;
    const sz = Math.max(1, this.size * cam.zoom * alpha);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;

    // Phase 2: line-shaped particles (speed lines, sparks)
    if (this.shape === 'line' && this.angle !== undefined) {
      const len = sz * 3;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = Math.max(1, sz * 0.5);
      ctx.beginPath();
      ctx.moveTo(sx - Math.cos(this.angle) * len / 2, sy - Math.sin(this.angle) * len / 2);
      ctx.lineTo(sx + Math.cos(this.angle) * len / 2, sy + Math.sin(this.angle) * len / 2);
      ctx.stroke();
    } else {
      ctx.fillRect(Math.floor(sx - sz/2), Math.floor(sy - sz/2), Math.ceil(sz), Math.ceil(sz));
    }
    ctx.globalAlpha = 1;
  }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  add(p) { this.particles.push(p); }
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update(dt);
      if (!this.particles[i].alive) this.particles.splice(i, 1);
    }
  }
  draw(ctx, cam) {
    for (const p of this.particles) p.draw(ctx, cam);
  }
  clear() { this.particles = []; }

  // Spawn blood burst
  blood(x, y, dir, intensity = 1) {
    const count = Math.floor(10 + intensity * 16);
    const colors = ['#cc1111', '#aa0000', '#880000', '#dd2222', '#991111', '#ff3333'];
    for (let i = 0; i < count; i++) {
      const ang = (dir > 0 ? 0 : Math.PI) + randRange(-1.0, 1.0);
      const spd = randRange(2, 8) * intensity;
      const vx = Math.cos(ang) * spd;
      const vy = Math.sin(ang) * spd + randRange(-3, 1);
      const size = randRange(3, 7);
      const life = randRange(400, 1200);
      this.add(new Particle(x, y, vx, vy, randItem(colors), size, life, 0.12, 0.94));
    }
    // Some drip particles (slower, larger, fall down)
    for (let i = 0; i < 3; i++) {
      const vx = randRange(-1, 1) + dir * 2;
      const vy = randRange(0.5, 2);
      this.add(new Particle(x, y, vx, vy, '#880000', randRange(4, 8), randRange(800, 1500), 0.15, 0.97));
    }
    // Batch 5: Persistent blood stains
    if (game && game.bloodStains && game.bloodStains.length < BLOOD_STAIN_MAX) {
      const stainCount = Math.floor(intensity * 2);
      for (let i = 0; i < stainCount; i++) {
        if (Math.random() < BLOOD_STAIN_CHANCE) {
          game.bloodStains.push({
            x: x + randRange(-10, 10) + dir * randRange(5, 20),
            y: y + randRange(-5, 10),
            size: randRange(2, 5 + intensity * 2),
            alpha: randRange(0.15, 0.35),
            color: randItem(['#660000', '#550000', '#440000', '#771111'])
          });
        }
      }
    }
  }

  // Blood pool that stays on ground
  bloodPool(x, y) {
    const colors = ['#550000', '#440000', '#660000', '#330000', '#770000'];
    for (let i = 0; i < 8; i++) {
      const px = x + randRange(-15, 15);
      const py = y + randRange(-4, 12);
      const size = randRange(4, 10);
      this.add(new Particle(px, py, 0, 0, randItem(colors), size, 20000, 0, 1));
    }
  }

  // Dust when walking
  dust(x, y) {
    const colors = ['#8a7a5a', '#7a6a4a', '#6a5a3a'];
    for (let i = 0; i < 3; i++) {
      const vx = randRange(-1, 1);
      const vy = randRange(-0.5, 0.2);
      this.add(new Particle(x + randRange(-8, 8), y + 12, vx, vy, randItem(colors), randRange(2, 5), randRange(200, 500), 0, 0.93));
    }
  }

  // Impact flash - big white burst with cross sparks
  impact(x, y) {
    const colors = ['#ffffff', '#ffffcc', '#ffddaa', '#ffffff'];
    for (let i = 0; i < 12; i++) {
      const ang = (Math.PI * 2 / 12) * i + randRange(-0.3, 0.3);
      const spd = randRange(3, 8);
      this.add(new Particle(x, y, Math.cos(ang) * spd, Math.sin(ang) * spd, randItem(colors), randRange(3, 6), randRange(60, 200), 0, 0.88));
    }
    // Phase 2: Cross-shaped spark (4 elongated lines)
    for (let i = 0; i < 4; i++) {
      const ang = (Math.PI / 2) * i + randRange(-0.2, 0.2);
      const spd = randRange(5, 12);
      const p = new Particle(x, y, Math.cos(ang) * spd, Math.sin(ang) * spd, '#ffffee', randRange(2, 3), randRange(40, 100), 0, 0.82);
      p.shape = 'line';
      p.angle = ang;
      this.add(p);
    }
  }

  // Batch 5: Impact dust at feet when knocked back
  impactDust(x, y) {
    const colors = ['#887766', '#776655', '#665544', '#998877'];
    for (let i = 0; i < IMPACT_DUST_COUNT; i++) {
      const ang = randRange(-Math.PI, Math.PI);
      const spd = randRange(0.5, 2);
      this.add(new Particle(
        x + randRange(-8, 8), y + randRange(8, 16),
        Math.cos(ang) * spd, Math.sin(ang) * spd - 0.5,
        randItem(colors), randRange(3, 6), randRange(300, 600), 0.02, 0.96
      ));
    }
  }

  // Phase 2: Speed lines on hooks
  speedLines(x, y, dirX, dirY) {
    const colors = ['#ffffff', '#ffffdd', '#ffeebb'];
    for (let i = 0; i < 5; i++) {
      const spread = randRange(-0.4, 0.4);
      const ang = Math.atan2(dirY, dirX) + spread;
      const spd = randRange(8, 16);
      const p = new Particle(x, y, Math.cos(ang) * spd, Math.sin(ang) * spd, randItem(colors), randRange(1.5, 2.5), randRange(60, 120), 0, 0.85);
      p.shape = 'line';
      p.angle = ang;
      this.add(p);
    }
  }
}

class Camera {
  constructor() {
    this.x = 0; this.y = 0;
    this.zoom = 1;
    this.targetX = 0; this.targetY = 0;
    this.shakeX = 0; this.shakeY = 0;
    this.shakeIntensity = 0;
    this.shakeDuration = 0;
    this.shakeTimer = 0;
    this.shakeDirX = 0; this.shakeDirY = 0; // Phase 2: directional shake
    this.followFast = false;
    this.worldW = CANVAS_W; this.worldH = CANVAS_H;

    // Phase 2: Zoom punch
    this.zoomPunchAmount = 0;
    this.zoomPunchTimer = 0;
    this.zoomPunchDuration = 0;
  }
  shake(intensity, duration, dirX = 0, dirY = 0) {
    this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
    this.shakeDuration = Math.max(this.shakeDuration, duration);
    this.shakeTimer = 0;
    // Phase 2: Store hit direction for directional bias
    if (dirX !== 0 || dirY !== 0) {
      const len = Math.hypot(dirX, dirY) || 1;
      this.shakeDirX = dirX / len;
      this.shakeDirY = dirY / len;
    }
  }
  zoomPunch(amount, duration) {
    this.zoomPunchAmount = amount;
    this.zoomPunchTimer = 0;
    this.zoomPunchDuration = duration;
  }
  setTarget(x, y) { this.targetX = x; this.targetY = y; }
  update(dt) {
    // Smooth follow
    const followSpeed = this.followFast ? 0.2 : 0.08;
    this.x = lerp(this.x, this.targetX - CANVAS_W / (2 * this.zoom), followSpeed);
    this.y = lerp(this.y, this.targetY - CANVAS_H / (2 * this.zoom), followSpeed);
    // Clamp to world - center if view exceeds world
    const viewW = CANVAS_W / this.zoom;
    const viewH = CANVAS_H / this.zoom;
    if (viewW >= this.worldW) {
      this.x = -(viewW - this.worldW) / 2;
    } else {
      this.x = clamp(this.x, 0, this.worldW - viewW);
    }
    if (viewH >= this.worldH) {
      this.y = -(viewH - this.worldH) / 2;
    } else {
      this.y = clamp(this.y, 0, this.worldH - viewH);
    }
    // Shake — Phase 2: directional bias
    if (this.shakeDuration > 0) {
      this.shakeTimer += dt;
      if (this.shakeTimer >= this.shakeDuration) {
        this.shakeDuration = 0;
        this.shakeIntensity = 0;
        this.shakeX = 0; this.shakeY = 0;
        this.shakeDirX = 0; this.shakeDirY = 0;
      } else {
        const decay = 1 - this.shakeTimer / this.shakeDuration;
        const int = this.shakeIntensity * decay;
        // 65% directional, 35% random noise
        const dirBias = 0.65;
        const randX = randRange(-int, int);
        const randY = randRange(-int, int);
        this.shakeX = this.shakeDirX * int * dirBias + randX * (1 - dirBias);
        this.shakeY = this.shakeDirY * int * dirBias + randY * (1 - dirBias);
      }
    }
    // Phase 2: Zoom punch decay
    if (this.zoomPunchDuration > 0) {
      this.zoomPunchTimer += dt;
      if (this.zoomPunchTimer >= this.zoomPunchDuration) {
        this.zoomPunchDuration = 0;
        this.zoomPunchAmount = 0;
      }
    }
  }
  get effectiveZoom() {
    let z = this.zoom;
    if (this.zoomPunchDuration > 0) {
      const t = this.zoomPunchTimer / this.zoomPunchDuration;
      const punch = this.zoomPunchAmount * (1 - t * t); // quadratic decay
      z += punch;
    }
    return z;
  }
  apply(ctx) {
    const ez = this.effectiveZoom;
    ctx.save();
    ctx.translate(Math.floor(this.shakeX), Math.floor(this.shakeY));
    ctx.scale(ez, ez);
    ctx.translate(Math.floor(-this.x), Math.floor(-this.y));
  }
  restore(ctx) { ctx.restore(); }
  screenToWorld(sx, sy) {
    return { x: sx / this.zoom + this.x, y: sy / this.zoom + this.y };
  }
}

// FLOATING DAMAGE NUMBERS — Phase 4
// ============================================================
class DamageNumberSystem {
  constructor() {
    this.numbers = [];
  }

  add(x, y, amount, isBlocked = false, isCrit = false, customText = null) {
    this.numbers.push({
      x, y,
      vy: -1.5 - Math.random() * 0.5,
      vx: randRange(-0.3, 0.3),
      text: customText || Math.round(amount).toString(),
      life: 800,
      maxLife: 800,
      isBlocked,
      isCrit,
      isCustom: !!customText,
      scale: isCrit ? 1.3 : (customText ? 1.1 : 1)
    });
  }

  update(dt) {
    for (let i = this.numbers.length - 1; i >= 0; i--) {
      const n = this.numbers[i];
      n.life -= dt;
      n.x += n.vx;
      n.y += n.vy;
      n.vy *= 0.97;
      if (n.life <= 0) {
        this.numbers.splice(i, 1);
      }
    }
  }

  draw(ctx) {
    for (const n of this.numbers) {
      const alpha = clamp(n.life / (n.maxLife * 0.5), 0, 1);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';

      const sz = Math.floor(6 * n.scale);
      ctx.font = `${sz}px "Press Start 2P", monospace`;

      // Shadow
      ctx.fillStyle = '#000000';
      ctx.fillText(n.text, n.x + 1, n.y + 1);

      // Color based on type
      if (n.isCustom) {
        ctx.fillStyle = '#44ddff'; // cyan for slip/counter text
      } else if (n.isBlocked) {
        ctx.fillStyle = '#8888aa';
      } else if (n.isCrit) {
        ctx.fillStyle = '#ff4444';
      } else {
        ctx.fillStyle = '#ffffff';
      }
      ctx.fillText(n.text, n.x, n.y);
      ctx.globalAlpha = 1;
    }
  }
}

// HUD DRAWING
// ============================================================
function drawHUD(ctx, mode) {
  if (mode === '1v1' || mode === 'cell') {
    draw1v1HUD(ctx);
  } else {
    drawRiotHUD(ctx);
  }
}

function draw1v1HUD(ctx) {
  if (!game || !game.player || !game.fighters[1]) return;
  const p = game.player;
  const e = game.fighters.find(f => f !== p);
  if (!e) return;

  // Dark header bar
  ctx.fillStyle = 'rgba(10,8,5,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, 58);
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(0, 58, CANVAS_W, 2);

  const barW = 320;
  const barH = 14;
  const barY = 18;

  // Player health (left, fills right to left)
  const pPct = p.health / p.maxHealth;
  const pBarX = CANVAS_W / 2 - barW - 30;
  // BG
  ctx.fillStyle = '#1a1111';
  ctx.fillRect(pBarX, barY, barW, barH);
  // Health
  const pColor = pPct > 0.5 ? '#44aa44' : pPct > 0.25 ? '#ccaa22' : '#cc2222';
  ctx.fillStyle = pColor;
  ctx.fillRect(pBarX + barW * (1 - pPct), barY, barW * pPct, barH);
  // Border
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 1;
  ctx.strokeRect(pBarX, barY, barW, barH);
  // Name
  ctx.fillStyle = '#c4943a';
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(p.name || 'PLAYER', pBarX, barY - 3);

  // Enemy health (right, fills left to right)
  const ePct = e.health / e.maxHealth;
  const eBarX = CANVAS_W / 2 + 30;
  ctx.fillStyle = '#1a1111';
  ctx.fillRect(eBarX, barY, barW, barH);
  const eColor = ePct > 0.5 ? '#44aa44' : ePct > 0.25 ? '#ccaa22' : '#cc2222';
  ctx.fillStyle = eColor;
  ctx.fillRect(eBarX, barY, barW * ePct, barH);
  ctx.strokeStyle = '#3a2a1a';
  ctx.strokeRect(eBarX, barY, barW, barH);
  ctx.fillStyle = '#c4943a';
  ctx.textAlign = 'right';
  ctx.fillText(e.name || 'OPPONENT', eBarX + barW, barY - 3);

  // VS
  ctx.fillStyle = '#5a4a3a';
  ctx.textAlign = 'center';
  ctx.font = '11px "Press Start 2P", monospace';
  ctx.fillText('VS', CANVAS_W / 2, barY + 12);

  // Gang colors under bars
  const pGC = GANG_COLORS[p.gangId];
  const eGC = GANG_COLORS[e.gangId];
  if (pGC) {
    ctx.fillStyle = pGC.primary;
    ctx.fillRect(pBarX, barY + barH + 2, barW, 2);
  }
  if (eGC) {
    ctx.fillStyle = eGC.primary;
    ctx.fillRect(eBarX, barY + barH + 2, barW, 2);
  }

  // Phase 2: Stamina bars (thin, below health)
  const stBarH = 5;
  const stBarY = barY + barH + 6;
  // Player stamina
  const pStPct = p.stamina / p.maxStamina;
  ctx.fillStyle = '#1a1111';
  ctx.fillRect(pBarX, stBarY, barW, stBarH);
  ctx.fillStyle = pStPct > 0.3 ? '#c4943a' : '#cc4422';
  ctx.fillRect(pBarX + barW * (1 - pStPct), stBarY, barW * pStPct, stBarH);
  ctx.strokeStyle = '#2a1a0a';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(pBarX, stBarY, barW, stBarH);
  // Enemy stamina
  const eStPct = e.stamina / e.maxStamina;
  ctx.fillStyle = '#1a1111';
  ctx.fillRect(eBarX, stBarY, barW, stBarH);
  ctx.fillStyle = eStPct > 0.3 ? '#c4943a' : '#cc4422';
  ctx.fillRect(eBarX, stBarY, barW * eStPct, stBarH);
  ctx.strokeStyle = '#2a1a0a';
  ctx.strokeRect(eBarX, stBarY, barW, stBarH);

  // Combo counter
  if (p.comboCount > 1) {
    ctx.fillStyle = '#ffd080';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.globalAlpha = clamp(p.comboTimer / 300, 0, 1);
    ctx.fillText(`${p.comboCount} HIT`, 20, 90);
    ctx.globalAlpha = 1;
  }

  // Batch 5: Heat indicator — small bar under stamina that fills orange→red
  if (p.heat > 0) {
    const heatBarH = 3;
    const heatBarY = stBarY + stBarH + 3;
    const heatPct = p.heat / HEAT_MAX;
    ctx.fillStyle = '#1a1111';
    ctx.fillRect(pBarX, heatBarY, barW, heatBarH);
    const pulse = p.heat > 70 ? (0.8 + Math.sin(Date.now() * 0.008) * 0.2) : 1;
    ctx.fillStyle = p.heat > 70 ? '#ff4400' : p.heat > 40 ? '#ff8800' : '#cc6600';
    ctx.globalAlpha = pulse;
    ctx.fillRect(pBarX + barW * (1 - heatPct), heatBarY, barW * heatPct, heatBarH);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(pBarX, heatBarY, barW, heatBarH);
  }

  // Batch 5: Stamina pulse when low
  if (pStPct < 0.25 && pStPct > 0) {
    const stPulse = 0.3 + Math.sin(Date.now() * 0.01) * 0.3;
    ctx.globalAlpha = stPulse;
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(pBarX + barW * (1 - pStPct), stBarY, barW * pStPct, stBarH);
    ctx.globalAlpha = 1;
  }

  // Batch 1: Clinch HUD
  if (p.inClinch) {
    ctx.fillStyle = 'rgba(10,8,5,0.8)';
    ctx.fillRect(CANVAS_W / 2 - 100, CANVAS_H - 50, 200, 30);
    ctx.fillStyle = '#ffaa44';
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('J:GUT SHOT  K:SHOVE  L:BREAK', CANVAS_W / 2, CANVAS_H - 32);
  }

  // Batch 1: Knockdown count display
  if (p.knockdownCount > 0 || e.knockdownCount > 0) {
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#cc4422';
    if (p.knockdownCount > 0) ctx.fillText(`KD: ${p.knockdownCount}/${MAX_KNOCKDOWNS}`, 20, 75);
    ctx.textAlign = 'right';
    if (e.knockdownCount > 0) ctx.fillText(`KD: ${e.knockdownCount}/${MAX_KNOCKDOWNS}`, CANVAS_W - 20, 75);
  }
}

function drawRiotHUD(ctx) {
  if (!game || !game.gangs) return;

  // Top bar
  ctx.fillStyle = 'rgba(10,8,5,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, 42);

  // Phase 3: Riot phase indicator
  const phaseLabels = {
    'calm': 'YARD TIME', 'tension': 'TENSIONS RISING',
    'eruption': 'RIOT', 'chaos': 'CHAOS', 'aftermath': 'AFTERMATH'
  };
  const phaseColors = {
    'calm': '#6a6a5a', 'tension': '#aa8844', 'eruption': '#cc4422',
    'chaos': '#ff2222', 'aftermath': '#888888'
  };
  ctx.fillStyle = phaseColors[game.riotPhase] || '#6a6a5a';
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(phaseLabels[game.riotPhase] || '', CANVAS_W - 10, 12);

  // Batch 2: Guard alarm countdown
  if (game.guardAlarmActive && !game.guardRecallActive) {
    const timeLeft = Math.max(0, game.guardAlarmDuration - game.guardAlarmTimer);
    const secs = Math.ceil(timeLeft / 1000);
    const isUrgent = timeLeft <= GUARD_WARNING_TIME;
    ctx.fillStyle = isUrgent ? '#ff4444' : '#aa8855';
    ctx.font = isUrgent ? '8px "Press Start 2P", monospace' : '6px "Press Start 2P", monospace';
    ctx.textAlign = 'right';
    const blink = isUrgent ? (Math.sin(Date.now() * 0.01) > 0 ? 1 : 0.3) : 1;
    ctx.globalAlpha = blink;
    ctx.fillText(`GUARDS: ${secs}s`, CANVAS_W - 10, 24);
    ctx.globalAlpha = 1;
  }
  if (game.guardRecallActive) {
    ctx.fillStyle = '#ff2222';
    ctx.font = '8px "Press Start 2P", monospace';
    ctx.textAlign = 'right';
    const blink = Math.sin(Date.now() * 0.015) > 0 ? 1 : 0.4;
    ctx.globalAlpha = blink;
    ctx.fillText('YARD DOWN!', CANVAS_W - 10, 24);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(0, 42, CANVAS_W, 2);

  // Gang morale bars
  const barW = 160;
  const barH = 8;
  let bx = 20;
  const by = 10;

  for (const gang of game.gangs) {
    const gc = GANG_COLORS[gang.id];
    if (!gc) continue;

    // Gang name
    ctx.fillStyle = gc.light;
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${gc.name} (${gang.aliveCount}/${gang.members.length})`, bx, by);

    // Morale bar
    const moralePct = gang.morale / 100;
    ctx.fillStyle = '#1a1111';
    ctx.fillRect(bx, by + 4, barW, barH);
    ctx.fillStyle = gc.primary;
    ctx.fillRect(bx, by + 4, barW * moralePct, barH);
    ctx.strokeStyle = '#3a2a1a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(bx, by + 4, barW, barH);

    // State indicator
    const stateColor = gang.state === GANG_STATES.RETREATING ? '#cc4422' :
                        gang.state === GANG_STATES.RALLYING ? '#44aacc' :
                        gang.state === GANG_STATES.FIGHTING ? '#ccaa22' : '#6a5a4a';
    ctx.fillStyle = stateColor;
    ctx.font = '5px "Press Start 2P", monospace';
    ctx.fillText(gang.state.toUpperCase(), bx, by + 20);

    // Phase 3: Broken member count
    const brokenCount = gang.members.filter(m => m.alive && m.broken).length;
    if (brokenCount > 0) {
      ctx.fillStyle = '#cc4422';
      ctx.fillText(`${brokenCount} SHOOK`, bx + 50, by + 20);
    }

    bx += barW + 40;
  }

  // Player health
  if (game.player) {
    const p = game.player;
    const pBarW = 200;
    const pBarH = 10;
    const px = CANVAS_W / 2 - pBarW / 2;
    const py = CANVAS_H - 30;
    const pPct = p.health / p.maxHealth;

    ctx.fillStyle = 'rgba(10,8,5,0.8)';
    ctx.fillRect(px - 10, py - 14, pBarW + 20, 36);

    ctx.fillStyle = '#c4943a';
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.name || 'YOU', CANVAS_W / 2, py - 4);

    ctx.fillStyle = '#1a1111';
    ctx.fillRect(px, py, pBarW, pBarH);
    const hColor = pPct > 0.5 ? '#44aa44' : pPct > 0.25 ? '#ccaa22' : '#cc2222';
    ctx.fillStyle = hColor;
    ctx.fillRect(px, py, pBarW * pPct, pBarH);
    ctx.strokeStyle = '#3a2a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, pBarW, pBarH);

    // Phase 2: Stamina bar under health
    const stY = py + pBarH + 3;
    const stH = 4;
    const stPct = p.stamina / p.maxStamina;
    ctx.fillStyle = '#1a1111';
    ctx.fillRect(px, stY, pBarW, stH);
    ctx.fillStyle = stPct > 0.3 ? '#c4943a' : '#cc4422';
    ctx.fillRect(px, stY, pBarW * stPct, stH);
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(px, stY, pBarW, stH);
  }
}

// ============================================================
// ANNOUNCEMENTS
// ============================================================
class Announcer {
  constructor() {
    this.text = '';
    this.subtext = '';
    this.timer = 0;
    this.duration = 0;
    this.fadeIn = 200;
    this.hold = 1000;
    this.fadeOut = 400;
  }

  show(text, subtext = '', duration = 2000) {
    this.text = text;
    this.subtext = subtext;
    this.timer = 0;
    this.duration = duration;
  }

  update(dt) {
    if (this.duration <= 0) return;
    this.timer += dt;
    if (this.timer >= this.duration) this.duration = 0;
  }

  draw(ctx) {
    if (this.duration <= 0) return;
    let alpha = 1;
    if (this.timer < this.fadeIn) {
      alpha = this.timer / this.fadeIn;
    } else if (this.timer > this.duration - this.fadeOut) {
      alpha = (this.duration - this.timer) / this.fadeOut;
    }
    alpha = clamp(alpha, 0, 1);

    ctx.save();
    ctx.globalAlpha = alpha;

    // Main text
    ctx.fillStyle = '#c4943a';
    ctx.font = '32px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Text shadow
    ctx.fillStyle = '#1a0a00';
    ctx.fillText(this.text, CANVAS_W / 2 + 2, CANVAS_H / 2 + 2);
    ctx.fillStyle = '#c4943a';
    ctx.fillText(this.text, CANVAS_W / 2, CANVAS_H / 2);

    // Subtext
    if (this.subtext) {
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillStyle = '#8a7a5a';
      ctx.fillText(this.subtext, CANVAS_W / 2, CANVAS_H / 2 + 30);
    }

    ctx.restore();
  }
}

const STATES = {
  IDLE: 'idle',
  WALK: 'walk',
  JAB: 'jab',
  HOOK: 'hook',
  BLOCK: 'block',
  HIT: 'hit',
  KNOCKDOWN: 'knockdown',
  GETUP: 'getup',
  SHOVE: 'shove',
  CLINCH: 'clinch',
  SLIP: 'slip',
  KO: 'ko'
};

class Fighter {
  constructor(x, y, charDef, gangId, traits = {}) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.charDef = charDef;
    this.gangId = gangId;
    this.facing = 1; // 1=right, -1=left

    // Traits (0-1 scale)
    this.traits = {
      aggression: traits.aggression ?? 0.5,
      toughness:  traits.toughness ?? 0.5,
      speed:      traits.speed ?? 0.5,
      power:      traits.power ?? 0.5,
      leadership: traits.leadership ?? 0,
      ...traits
    };

    // Phase 3: Fighter personality
    // Derived from traits — affects AI behavior style
    this.personality = this._derivePersonality();

    // Phase 3: Individual morale/fear (0=fearless, 100=terrified)
    this.fear = 0;
    this.maxFear = 100;
    this.fearDecayRate = 3 + this.traits.toughness * 4;
    this.fearThreshold = 60 + this.traits.toughness * 30;
    this.broken = false;

    // Phase 4: Injury system
    this.injuries = 0;
    this.injuryThresholds = [25, 50, 75];
    this.hitsLanded = 0;
    this.hitsTaken = 0;
    this.damageDealt = 0;
    this.knockdowns = 0;        // KOs inflicted (stat)

    // Batch 1: Knockdown system (reworked)
    this.knockdownCount = 0;    // times this fighter has been knocked down
    this.knockdownTimer = 0;    // time remaining on ground
    this.getupTaps = 0;         // player mash counter
    this.isDown = false;        // currently on the ground
    this.wobbleTimer = 0;       // post-knockdown wobble (slow + vulnerable)
    this.aiGetupDelay = 0;      // variable AI get-up timing

    // Batch 2: Blood trail
    this.bloodTrailTimer = 0;

    // Batch 2: Stagger system
    this.rapidHitCount = 0;     // consecutive hits in window
    this.rapidHitTimer = 0;     // time since first hit in rapid sequence
    this.staggerTimer = 0;      // remaining stagger time
    this.isStaggered = false;

    // Batch 1: Clinch system
    this.clinchPartner = null;  // the other fighter in clinch
    this.clinchTimer = 0;       // how long in clinch
    this.clinchProximityTimer = 0; // how long close enough to trigger clinch
    this.clinchCooldown = 0;    // prevent instant re-clinch after break

    // Derived stats
    this.maxHealth = MAX_HEALTH * (0.8 + this.traits.toughness * 0.4);
    this.health = this.maxHealth;
    this.baseMoveSpeed = 1.2 + this.traits.speed * 0.8;
    this.damageMult = 0.7 + this.traits.power * 0.6;

    // Phase 2: Stamina
    this.stamina = MAX_STAMINA;
    this.maxStamina = MAX_STAMINA;

    // State
    this.state = STATES.IDLE;
    this.stateTimer = 0;
    this.animFrame = 0;
    this.animTimer = 0;
    this.hitFlash = 0;
    this.invulnFrames = 0;
    this.comboCount = 0;
    this.comboTimer = 0;
    this.dustTimer = 0;
    this.target = null;
    this.isPlayer = false;
    this.alive = true;
    this.koTimer = 0;
    this.gangRole = 'fighter'; // vanguard, fighter, follower
    this.name = '';

    // Phase 1A: Time-based hitstop
    this.hitstopTimer = 0;
    this.hitstopDuration = 0;

    // Phase 1B: Knockback deceleration curves
    this.knockbackTimer = 0;
    this.knockbackDuration = 0;
    this.bounceVy = 0;       // vertical bounce velocity (visual only)
    this.bounceY = 0;        // current vertical offset from bounce

    // Phase 1C: Attack recovery cooldown
    this.recoveryCooldown = 0;

    // Input buffer — stores attack input so rapid pressing feels responsive
    this.inputBuffer = null;      // 'jab', 'hook', 'shove', or null
    this.inputBufferTimer = 0;    // ms remaining on buffered input

    // Block commitment & guard mechanics
    this.blockRaiseTimer = 0;
    this.blockRaised = false;
    this.guardStunTimer = 0;
    this.guardPressure = 0;
    this.lastAttackMoveMult = 0.5;

    // AI auto-unblock timer
    this._autoUnblockTimer = 0;

    // Fear submission timer
    this._brokenTimer = 0;

    // Batch 4: Heat (momentum) system
    this.heat = 0;
    this.heatDecayTimer = 0;       // ms since last hit landed
    this.lastHitLandedTime = 0;    // timestamp of last successful hit

    // Batch 4: Slip/duck
    this.isSlipping = false;
    this.slipTimer = 0;
    this.slipCooldown = 0;
    this.slipCounterWindow = 0;    // ms remaining where next attack is a counter

    // Batch 4: Whiff tracking
    this.lastAttackHit = false;    // did the last attack connect?

    // Batch 5: Juice
    this.hitConfirmTimer = 0;      // white outline flash when you land a hit
    this.comboDisplayTimer = 0;    // ms remaining to show combo counter
    this.failedInputTimer = 0;    // red flash when attack input blocked
    this.lastSlipDirection = 0;    // direction player was holding during slip

    // Hitbox tracking
    this.hitboxActive = false;
    this.hitRegistered = false; // prevent multi-hit per swing
    this.hitTargets = new Set();
  }

  _derivePersonality() {
    const a = this.traits.aggression;
    const t = this.traits.toughness;
    const s = this.traits.speed;
    const p = this.traits.power;

    // Personality archetypes based on trait combinations
    if (a > 0.7 && p > 0.6) return 'brawler';       // Aggressive heavy hitter, walks forward throwing
    if (a < 0.4 && s > 0.6) return 'counterpuncher'; // Patient, waits for openings
    if (a > 0.6 && t > 0.7) return 'bully';          // Pressures weak opponents, fights dirty
    if (t < 0.4 && a < 0.5) return 'coward';         // Fights from edges, runs when hurt
    if (s > 0.7 && a > 0.5) return 'swarmer';        // Fast, gets in close, rapid jabs
    if (p > 0.7 && s < 0.5) return 'slugger';        // Slow but devastating hooks
    return 'balanced';
  }

  get cx() { return this.x; }
  get cy() { return this.y; }
  get moveSpeed() {
    let spd = this.baseMoveSpeed;
    // Batch 4: Heat speed bonus
    if (this.heat > 0) spd *= (1 + (this.heat / HEAT_MAX) * HEAT_SPEED_BONUS);
    // Wobble slows you down
    if (this.wobbleTimer > 0) spd *= WOBBLE_SPEED_MULT;
    return spd;
  }
  get isActing() {
    return this.state === STATES.JAB || this.state === STATES.HOOK || this.state === STATES.SHOVE ||
           this.state === STATES.HIT || this.state === STATES.KNOCKDOWN ||
           this.state === STATES.GETUP || this.state === STATES.CLINCH || this.state === STATES.KO ||
           this.state === STATES.SLIP || this.isStaggered;
  }
  get canMove() {
    if (this.state === STATES.HIT || this.state === STATES.KNOCKDOWN ||
        this.state === STATES.GETUP || this.state === STATES.KO ||
        this.state === STATES.CLINCH || this.state === STATES.SLIP) return false;
    if (this.isStaggered) return false;
    return true;
  }

  get canAttack() {
    if (this.recoveryCooldown > 0) return false;
    if (this.state === STATES.JAB || this.state === STATES.HOOK ||
        this.state === STATES.SHOVE || this.state === STATES.HIT ||
        this.state === STATES.KNOCKDOWN || this.state === STATES.GETUP ||
        this.state === STATES.CLINCH || this.state === STATES.KO) return false;
    if (this.guardStunTimer > 0) return false;
    return true;
  }

  get recoveryMoveSpeed() {
    if (this.recoveryCooldown > 0) {
      return this.lastAttackMoveMult || 0.5;
    }
    return 1;
  }

  get canAct() {
    return this.canAttack;
  }
  get inClinch() {
    return this.state === STATES.CLINCH && this.clinchPartner !== null;
  }

  setState(newState) {
    if (this.state === newState) return;
    this.state = newState;
    this.stateTimer = 0;
    this.animFrame = 0;
    this.animTimer = 0;
    this.hitboxActive = false;
    this.hitRegistered = false;
    this.hitTargets.clear();
    // Clear input buffer on hit/knockdown/KO — don't auto-attack out of stun
    if (newState === STATES.HIT || newState === STATES.KNOCKDOWN || newState === STATES.KO) {
      this.inputBuffer = null;
      this.inputBufferTimer = 0;
    }
  }

  // Batch 5: Smart lunge — scales by distance, no lunge if already close
  _applyLunge(force) {
    if (!this.target) {
      this.vx += this.facing * force * 0.5;
      return;
    }
    const d = Math.hypot(this.target.x - this.x, this.target.y - this.y);
    if (d < LUNGE_MIN_DIST) return; // already in their face, no lunge
    const scale = Math.min(1, (d - LUNGE_MIN_DIST) / (LUNGE_MAX_DIST - LUNGE_MIN_DIST));
    const dir = Math.atan2(this.target.y - this.y, this.target.x - this.x);
    this.vx += Math.cos(dir) * force * scale;
    this.vy += Math.sin(dir) * force * scale;
  }

  jab() {
    if (!this.canAttack) return;
    if (this.stamina < JAB_STAMINA_COST * 0.5) return;
    if (this.slipCounterWindow > 0) this._isCounterAttack = true;
    this.stamina -= JAB_STAMINA_COST;
    if (this.stamina < 0) this.stamina = 0;
    // Batch 5: Lock facing at moment of attack
    if (this.target) this.faceTarget();
    this.setState(STATES.JAB);
    this.lastAttackMoveMult = MOVE_DEFS.jab.moveSpeedMult;
    this.lastAttackHit = false;
    this._applyLunge(LUNGE_FORCE_JAB);
  }

  hook() {
    if (!this.canAttack) return;
    if (this.stamina < HOOK_STAMINA_COST * 0.5) return;
    if (this.slipCounterWindow > 0) this._isCounterAttack = true;
    this.stamina -= HOOK_STAMINA_COST;
    if (this.stamina < 0) this.stamina = 0;
    if (this.target) this.faceTarget();
    this.setState(STATES.HOOK);
    this.lastAttackMoveMult = MOVE_DEFS.hook.moveSpeedMult;
    this.lastAttackHit = false;
    this._applyLunge(LUNGE_FORCE_HOOK);
  }

  block() {
    if (this.state === STATES.HIT || this.state === STATES.KNOCKDOWN || this.state === STATES.KO) return;
    if (this.guardStunTimer > 0) return; // can't block during guard stun
    if (this.state !== STATES.BLOCK) {
      this.setState(STATES.BLOCK);
      this.blockRaiseTimer = 0;
      this.blockRaised = false;
    }
  }

  unblock() {
    if (this.state === STATES.BLOCK) this.setState(STATES.IDLE);
  }

  shove() {
    if (!this.canAttack) return;
    if (this.stamina < MOVE_DEFS.shove.staminaCost * 0.5) return;
    this.stamina -= MOVE_DEFS.shove.staminaCost;
    if (this.stamina < 0) this.stamina = 0;
    this.setState(STATES.SHOVE);
    this.lastAttackMoveMult = MOVE_DEFS.shove.moveSpeedMult;
  }

  // Batch 4: Slip/duck — dodges hooks, vulnerable to jabs
  slip(slipDirX, slipDirY) {
    if (this.state !== STATES.IDLE && this.state !== STATES.WALK && this.state !== STATES.BLOCK) return;
    if (this.slipCooldown > 0) return;
    if (this.guardStunTimer > 0) return;
    this.setState(STATES.SLIP);
    this.isSlipping = true;
    this.slipTimer = SLIP_DURATION;
    this.slipCooldown = SLIP_DURATION + SLIP_COOLDOWN;
    SFX.slip();
    // Batch 5: Directional slip — player controls slip direction
    if (slipDirX !== undefined && (slipDirX !== 0 || slipDirY !== 0)) {
      const len = Math.hypot(slipDirX, slipDirY) || 1;
      this.vx += (slipDirX / len) * 2.5;
      this.vy += (slipDirY / len) * 2.5;
    } else if (this.target) {
      // AI/default: lateral dodge relative to attacker
      const perpDir = Math.atan2(this.target.y - this.y, this.target.x - this.x) + (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2);
      this.vx += Math.cos(perpDir) * 2;
      this.vy += Math.sin(perpDir) * 2;
    }
  }

  // Batch 1: Clinch actions
  enterClinch(partner) {
    if (this.state === STATES.KO || this.state === STATES.KNOCKDOWN || this.state === STATES.GETUP) return;
    this.clinchPartner = partner;
    this.clinchTimer = 0;
    this.setState(STATES.CLINCH);
    this.vx = 0; this.vy = 0;
  }

  clinchGutShot() {
    if (!this.inClinch) return;
    if (this.stamina < 3) return;
    this.stamina -= 3;
    const partner = this.clinchPartner;
    if (partner && partner.alive) {
      partner.health -= CLINCH_GUT_SHOT_DAMAGE * this.damageMult;
      partner.injuries = Math.min(100, partner.injuries + CLINCH_GUT_SHOT_INJURY / 100 * 40);
      partner.hitFlash = 4;
      partner.hitsTaken++;
      this.hitsLanded++;
      this.damageDealt += CLINCH_GUT_SHOT_DAMAGE * this.damageMult;
      // Damage number
      if (game && game.dmgNumbers) {
        game.dmgNumbers.add(partner.x, partner.y - 20, CLINCH_GUT_SHOT_DAMAGE * this.damageMult, false, false);
      }
      if (partner.health <= 0) {
        partner.health = 0;
        this.breakClinch();
        partner.setState(STATES.KO);
        partner.koTimer = KO_DURATION;
        partner.alive = false;
      }
    }
  }

  clinchShove() {
    if (!this.inClinch) return;
    if (this.stamina < CLINCH_SHOVE_STAMINA) return;
    this.stamina -= CLINCH_SHOVE_STAMINA;
    const partner = this.clinchPartner;
    if (partner) {
      const ang = Math.atan2(partner.y - this.y, partner.x - this.x);
      partner.vx = Math.cos(ang) * CLINCH_SHOVE_FORCE;
      partner.vy = Math.sin(ang) * CLINCH_SHOVE_FORCE;
      partner.setState(STATES.HIT);
      partner.invulnFrames = 8;
    }
    this.breakClinch();
  }

  breakClinch() {
    const partner = this.clinchPartner;
    this.clinchPartner = null;
    this.clinchTimer = 0;
    this.clinchCooldown = 800;
    if (this.state === STATES.CLINCH) this.setState(STATES.IDLE);
    if (partner) {
      partner.clinchPartner = null;
      partner.clinchTimer = 0;
      partner.clinchCooldown = 800;
      if (partner.state === STATES.CLINCH) partner.setState(STATES.IDLE);
    }
  }

  // Reworked knockdown
  knockDown() {
    this.knockdownCount++;
    this.isDown = true;
    this.getupTaps = 0;
    this.setState(STATES.KNOCKDOWN);
    this.knockdownTimer = KNOCKDOWN_DURATION;
    this.vx = 0; this.vy = 0;

    // Variable AI get-up delay based on condition
    if (!this.isPlayer) {
      // "Willpower" to get up — how much fight is left
      let willToGetUp = this.traits.toughness * 0.4 + 0.3;
      willToGetUp -= this.knockdownCount * 0.15;      // each knockdown saps will
      willToGetUp -= (this.injuries / 100) * 0.25;    // injuries make it harder
      willToGetUp -= (this.fear / this.maxFear) * 0.2; // fear saps will
      willToGetUp = clamp(willToGetUp, 0, 1);

      if (willToGetUp < 0.15) {
        // Too broken — AI stays down, will time out to KO
        this.aiGetupDelay = KNOCKDOWN_DURATION + 999; // won't try
      } else {
        // Variable timing: tough fighters get up faster, hurt fighters struggle
        const fastest = KNOCKDOWN_DURATION * 0.25;
        const slowest = KNOCKDOWN_DURATION * 0.8;
        this.aiGetupDelay = lerp(slowest, fastest, willToGetUp);
        // Add randomness so it doesn't feel robotic
        this.aiGetupDelay += randRange(-200, 300);
      }
    }

    SFX.knockdown();

    // Camera + effects
    if (game) {
      const shDirX = this.facing * -1;
      game.camera.shake(8, 300, shDirX, 0);
      game.camera.zoomPunch(0.08, 250);
      game.hitFlashAlpha = 0.12;
      game.particles.bloodPool(this.x, this.y + 4);
    }

    if (game) {
      game.announcer.show(`${this.name} DOWN!`, `Knockdown #${this.knockdownCount}`, 1500);
    }
  }

  attemptGetUp() {
    if (this.state !== STATES.KNOCKDOWN || !this.isDown) return;
    this.getupTaps++;
    const needed = GETUP_TAPS_NEEDED + (this.knockdownCount - 1) * 2; // harder each time
    if (this.getupTaps >= needed) {
      this.isDown = false;
      this.setState(STATES.GETUP);
      // Recovery — fighting spirit gives a small health boost
      this.health = Math.min(this.maxHealth, this.health + this.maxHealth * KNOCKDOWN_HEALTH_RECOVERY);
      this.invulnFrames = 30; // brief invuln on get-up
      this.fear = Math.max(0, this.fear - 15); // adrenaline reduces fear
      // Post-knockdown wobble — fighter is slow and vulnerable after getting up
      this.wobbleTimer = WOBBLE_DURATION + this.knockdownCount * 400; // wobble longer each knockdown
      // Get-up animation timer
      this.stateTimer = 0;
    }
  }

  takeDamage(amount, knockDir, knockForce, attacker, isHook = false) {
    if (this.invulnFrames > 0 || this.state === STATES.KO || this.state === STATES.KNOCKDOWN) return false;

    let actualDamage = amount;
    let actualKnock = knockForce;
    let blocked = false;

    if (this.state === STATES.BLOCK && this.blockRaised) {
      const fromRight = attacker.x > this.x;
      const facingAttacker = (fromRight && this.facing === 1) || (!fromRight && this.facing === -1);
      if (facingAttacker) {
        actualDamage *= BLOCK_DAMAGE_MULT;
        actualKnock *= BLOCK_KNOCKBACK_MULT;
        blocked = true;

        // Guard mechanics — shoves and hooks crack guard
        const moveDef = isHook ? MOVE_DEFS.hook :
                        (attacker.state === STATES.SHOVE ? MOVE_DEFS.shove : MOVE_DEFS.jab);
        this.guardStunTimer = moveDef.guardStun;
        this.guardPressure += moveDef.guardDamage;

        // Pushback on block
        const pushDir = Math.atan2(this.y - attacker.y, this.x - attacker.x);
        this.vx += Math.cos(pushDir) * moveDef.blockPushback;
        this.vy += Math.sin(pushDir) * moveDef.blockPushback;

        // Guard break — too much pressure cracks the guard
        if (this.guardPressure >= 40) {
          this.guardPressure = 0;
          this.guardStunTimer = 400;
          this.unblock();
          this.isStaggered = true;
          this.staggerTimer = 500;
          blocked = false; // the breaking hit gets through
          actualDamage = amount * 0.6; // partial damage on guard break
          if (game) game.announcer.show('GUARD BREAK!', '', 800);
        }
      }
    }

    this.health -= actualDamage;
    this.vx += Math.cos(knockDir) * actualKnock;
    this.vy += Math.sin(knockDir) * actualKnock;
    this.hitFlash = 6;

    // Phase 3: Fear increases when hit
    if (!blocked) {
      const fearGain = (actualDamage / this.maxHealth) * 80 * (1 - this.traits.toughness * 0.5);
      this.fear = Math.min(this.maxFear, this.fear + fearGain);
      if (this.fear >= this.fearThreshold) this.broken = true;
      this.setState(STATES.HIT);
      this.invulnFrames = 8;

      // Batch 4: Getting hit kills your momentum
      this.heat *= (1 - HEAT_RESET_ON_HIT);
      this.heatDecayTimer = 0;

      // Phase 4: Accumulate injuries
      this.injuries = Math.min(100, this.injuries + (actualDamage / this.maxHealth) * 40);
      this.hitsTaken++;

      // Batch 2: Stagger — track rapid consecutive hits
      if (this.rapidHitTimer > 0 && this.rapidHitTimer < STAGGER_HIT_WINDOW) {
        this.rapidHitCount++;
      } else {
        this.rapidHitCount = 1;
      }
      this.rapidHitTimer = STAGGER_HIT_WINDOW;
      // Trigger stagger at threshold
      if (this.rapidHitCount >= STAGGER_HIT_THRESHOLD && !this.isStaggered) {
        this.isStaggered = true;
        this.staggerTimer = STAGGER_DURATION;
        this.rapidHitCount = 0;
        if (game && game.particles) {
          // Dizzy stars effect
          for (let i = 0; i < 5; i++) {
            const p = new Particle(
              this.x + randRange(-10, 10), this.y - 20 + randRange(-5, 5),
              randRange(-1, 1), randRange(-1.5, -0.3),
              '#ffdd44', randRange(2, 4), 500, 0, 0.95
            );
            game.particles.add(p);
          }
        }
      }
    } else {
      this.fear = Math.min(this.maxFear, this.fear + 3);
    }

    // Reworked knockdown/KO system — not every fight goes to 3 knockdowns
    if (this.health <= 0) {
      const overkill = Math.abs(this.health) / this.maxHealth; // how far past 0

      // Instant KO chance — devastating hits can skip knockdown entirely
      let instantKOChance = INSTANT_KO_BASE_CHANCE;
      if (isHook) instantKOChance += INSTANT_KO_HOOK_BONUS;
      instantKOChance += overkill * INSTANT_KO_OVERKILL_SCALE;
      if (attacker) instantKOChance += attacker.traits.power * 0.12;
      // Already been down? More likely to stay down for good
      instantKOChance += this.knockdownCount * 0.15;
      // High injuries make instant KO more likely
      instantKOChance += (this.injuries / 100) * 0.15;

      if (Math.random() < instantKOChance || this.knockdownCount >= MAX_KNOCKDOWNS) {
        // Straight KO — lights out
        this.health = 0;
        this.setState(STATES.KO);
        this.koTimer = KO_DURATION;
        this.alive = false;
        if (game && this.knockdownCount >= MAX_KNOCKDOWNS) {
          game.announcer.show('TKO!', `${this.name} can't continue`, 2000);
        }
        return { blocked, damage: actualDamage, ko: true };
      } else {
        // Knockdown — fighter goes down but might get up
        this.health = 1; // keep alive
        this.knockDown();
        return { blocked, damage: actualDamage, knockdown: true };
      }
    } else if (!blocked) {
      // Chance of knockdown on hooks when health is low
      const healthPct = this.health / this.maxHealth;
      if (healthPct < KNOCKDOWN_THRESHOLD && isHook) {
        const knockdownChance = KNOCKDOWN_HOOK_CHANCE * (1 - healthPct / KNOCKDOWN_THRESHOLD);
        if (Math.random() < knockdownChance && this.knockdownCount < MAX_KNOCKDOWNS) {
          this.knockDown();
          return { blocked, damage: actualDamage, knockdown: true };
        }
      }
    }

    return { blocked, damage: actualDamage };
  }

  getHitbox() {
    if (!this.hitboxActive) return null;
    const reach = PUNCH_REACH;
    return {
      x: this.x + this.facing * reach - PUNCH_WIDTH / 2,
      y: this.y - PUNCH_HEIGHT / 2,
      w: PUNCH_WIDTH,
      h: PUNCH_HEIGHT
    };
  }

  getHurtbox() {
    return {
      x: this.x - 14,
      y: this.y - 16,
      w: 28,
      h: 32
    };
  }

  faceTarget() {
    if (this.target) {
      this.facing = this.target.x > this.x ? 1 : -1;
    }
  }

  update(dt) {
    // Phase 1A: Time-based hitstop with ease-out
    if (this.hitstopDuration > 0) {
      this.hitstopTimer += dt;
      if (this.hitstopTimer >= this.hitstopDuration) {
        this.hitstopTimer = 0;
        this.hitstopDuration = 0;
      } else {
        // Ease-out: allow slight movement toward end of hitstop for weight feel
        const t = this.hitstopTimer / this.hitstopDuration;
        const easeOut = t * t; // quadratic ease — frozen at start, easing out at end
        // During hitstop, scale dt by easeOut so we're nearly frozen early, unfreezing late
        dt *= easeOut * 0.3; // even at the end of hitstop, only 30% speed
        if (dt < 0.1) return; // effectively frozen
      }
    }

    this.stateTimer += dt;
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.invulnFrames > 0) this.invulnFrames--;
    if (this.comboTimer > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) this.comboCount = 0;
    }
    // Batch 5: Hit confirm + combo display + failed input timers
    if (this.hitConfirmTimer > 0) this.hitConfirmTimer -= dt;
    if (this.comboDisplayTimer > 0) this.comboDisplayTimer -= dt;
    if (this.failedInputTimer > 0) this.failedInputTimer -= dt;

    // Phase 1C: Tick recovery cooldown
    if (this.recoveryCooldown > 0) {
      this.recoveryCooldown -= dt;
      if (this.recoveryCooldown < 0) this.recoveryCooldown = 0;
    }

    // Input buffer — execute buffered attack when able
    if (this.inputBuffer && this.inputBufferTimer > 0) {
      this.inputBufferTimer -= dt;
      if (this.inputBufferTimer <= 0) {
        this.inputBuffer = null;
        this.inputBufferTimer = 0;
      } else if (this.canAttack) {
        const buffered = this.inputBuffer;
        this.inputBuffer = null;
        this.inputBufferTimer = 0;
        if (buffered === 'jab') this.jab();
        else if (buffered === 'hook') this.hook();
        else if (buffered === 'shove') this.shove();
      }
    }

    // Guard stun timer decay
    if (this.guardStunTimer > 0) {
      this.guardStunTimer -= dt;
      if (this.guardStunTimer < 0) this.guardStunTimer = 0;
    }
    // Guard pressure decay
    if (this.guardPressure > 0) {
      this.guardPressure -= dt * 0.015; // slow decay
      if (this.guardPressure < 0) this.guardPressure = 0;
    }

    // Batch 4: Heat decay
    this.heatDecayTimer += dt;
